<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDLOG IT Ops — Support Desk</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0B3D62">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
  :root{
    --bg:#EEF1F4; --surface:#FFF; --surface-2:#F6F8FA; --ink:#0F1B2D; --ink-soft:#54657A; --ink-faint:#8A99AC;
    --border:#DCE2E8; --brand:#0B3D62; --brand-2:#0E7C86; --brand-soft:#E7EEF3; --gold:#B8893F;
    --pending:#B45309; --pending-bg:#FDF1E1; --progress:#1D4ED8; --progress-bg:#E6EDFC;
    --testing:#6D28D9; --testing-bg:#EFE7FB; --closed:#15803D; --closed-bg:#E5F4EA;
    --reopened:#BE185D; --reopened-bg:#FCE4ED; --critical:#B91C1C;
    --radius:10px; --mono:ui-monospace,Menlo,Consolas,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body{background:var(--bg); color:var(--ink); font-family:var(--sans); -webkit-font-smoothing:antialiased;}
  button,input,select,textarea{font-family:inherit;}
  :focus-visible{outline:2px solid var(--brand-2); outline-offset:2px;}
  #app{min-height:100vh; display:flex; flex-direction:column;}
  header.topbar{background:var(--brand); color:#fff; padding:12px 24px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; border-bottom:3px solid var(--gold);}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .mark{width:34px; height:34px; border-radius:7px; background:var(--brand-2); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px;}
  .brand .name{font-weight:700; font-size:16px;}
  .brand .sub{font-size:11px; color:#C9D8E3; letter-spacing:1.1px; text-transform:uppercase; margin-top:1px;}
  .topnav{display:flex; gap:6px; background:rgba(255,255,255,0.08); padding:4px; border-radius:8px; flex-wrap:wrap;}
  .topnav button{border:none; background:transparent; color:#D9E4EC; padding:8px 15px; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer;}
  .topnav button.active{background:#fff; color:var(--brand);}
  .session-info{font-size:12px; color:#C9D8E3; display:flex; align-items:center; gap:10px;}
  .session-info .role-chip{background:rgba(255,255,255,0.16); padding:2px 8px; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.4px;}
  .session-info button.link{background:none; border:none; color:#fff; text-decoration:underline; cursor:pointer; font-size:12px; padding:0;}
  main{flex:1; padding:24px; max-width:1180px; margin:0 auto; width:100%;}
  .card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px;}
  h1.page-title{font-size:20px; margin:0 0 4px; color:var(--brand);}
  p.page-sub{font-size:13px; color:var(--ink-soft); margin:0 0 22px;}
  .section-label{font-size:12px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.6px; margin:0 0 10px;}
  .stat-row{display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin-bottom:18px;}
  @media (max-width:980px){.stat-row{grid-template-columns:repeat(3,1fr);}}
  @media (max-width:560px){.stat-row{grid-template-columns:repeat(2,1fr);}}
  .stat{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:13px 15px;}
  .stat .n{font-family:var(--mono); font-size:22px; font-weight:700; color:var(--brand);}
  .stat .l{font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.5px; margin-top:2px;}
  .stat.alert .n{color:var(--critical);} .stat.accent .n{color:var(--brand-2);}
  .two-col{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:18px;}
  @media (max-width:820px){.two-col{grid-template-columns:1fr;}}
  label{display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:5px;}
  input[type=text],input[type=password],input[type=email],input[type=date],select,textarea{width:100%; padding:10px 11px; border:1px solid var(--border); border-radius:7px; font-size:13.5px; color:var(--ink); background:#fff;}
  textarea{resize:vertical; min-height:84px;}
  .field{margin-bottom:16px;} .field-row{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media (max-width:640px){.field-row{grid-template-columns:1fr;}}
  .btn{display:inline-flex; align-items:center; gap:6px; background:var(--brand); color:#fff; border:none; padding:10px 18px; border-radius:7px; font-size:13.5px; font-weight:600; cursor:pointer;}
  .btn:hover{background:#0a3251;}
  .btn.secondary{background:#fff; color:var(--brand); border:1px solid var(--border);}
  .btn.danger{background:#fff; color:var(--critical); border:1px solid #F3C9C9;}
  .btn.tiny{padding:6px 11px; font-size:12px;}
  .btn:disabled{opacity:.5; cursor:not-allowed;}
  .btn-row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  .subnav{display:flex; gap:18px; margin-bottom:18px; border-bottom:1px solid var(--border);}
  .subnav button{background:none; border:none; padding:10px 2px; font-size:13.5px; font-weight:600; color:var(--ink-soft); cursor:pointer; border-bottom:2px solid transparent; position:relative; top:1px;}
  .subnav button.active{color:var(--brand); border-bottom-color:var(--brand-2);}
  .badge{display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700; padding:4px 9px; border-radius:20px; white-space:nowrap;}
  .badge.pending{background:var(--pending-bg); color:var(--pending);}
  .badge.progress{background:var(--progress-bg); color:var(--progress);}
  .badge.testing{background:var(--testing-bg); color:var(--testing);}
  .badge.closed{background:var(--closed-bg); color:var(--closed);}
  .badge.reopened{background:var(--reopened-bg); color:var(--reopened);}
  .badge.priority-Critical{background:#FBE1E1; color:var(--critical);}
  .badge.priority-High{background:#FCEBD8; color:#9A4D0B;}
  .badge.priority-Medium{background:#EFF1F4; color:var(--ink-soft);}
  .badge.priority-Low{background:#EFF1F4; color:var(--ink-faint);}
  .badge.overdue{background:#FBE1E1; color:var(--critical);}
  .badge.svc{background:var(--brand-soft); color:var(--brand);}
  .ticket-id{font-family:var(--mono); font-size:12px; color:var(--ink-soft);}
  .filters{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; align-items:flex-end;}
  .filters .field{margin-bottom:0; min-width:150px;} .filters .search{flex:1; min-width:200px;}
  .ticket-list{display:flex; flex-direction:column; gap:10px;}
  .ticket-row{background:var(--surface); border:1px solid var(--border); border-radius:9px; padding:14px 16px; cursor:pointer; display:flex; align-items:center; gap:14px; border-left:4px solid var(--ink-faint);}
  .ticket-row:hover{border-color:var(--brand-2);}
  .ticket-row.status-Pending{border-left-color:var(--pending);}
  .ticket-row.status-In-Progress{border-left-color:var(--progress);}
  .ticket-row.status-Testing{border-left-color:var(--testing);}
  .ticket-row.status-Closed{border-left-color:var(--closed);}
  .ticket-row.status-Reopened{border-left-color:var(--reopened);}
  .ticket-row .col-main{flex:1; min-width:0;}
  .ticket-row .subject{font-weight:600; font-size:14px; margin-bottom:3px;}
  .ticket-row .meta{font-size:12px; color:var(--ink-soft); display:flex; gap:10px; flex-wrap:wrap;}
  .ticket-row .col-status{display:flex; flex-direction:column; align-items:flex-end; gap:6px;}
  .empty-state{text-align:center; padding:46px 20px; color:var(--ink-soft); font-size:13.5px; border:1px dashed var(--border); border-radius:var(--radius); background:var(--surface-2);}
  .bars{display:flex; flex-direction:column; gap:9px;}
  .bar-row{display:flex; align-items:center; gap:10px;}
  .bar-row .b-label{font-size:12.5px; color:var(--ink-soft); width:230px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .bar-row .b-track{flex:1; height:8px; background:var(--surface-2); border-radius:6px; overflow:hidden;}
  .bar-row .b-fill{height:100%; background:var(--brand-2); border-radius:6px;}
  .bar-row .b-count{font-family:var(--mono); font-size:12px; width:26px; text-align:right;}
  .detail-header{display:flex; justify-content:space-between; align-items:flex-start; gap:14px; margin-bottom:14px; flex-wrap:wrap;}
  .detail-header h2{font-size:17px; margin:2px 0 6px;}
  .back-link{background:none; border:none; color:var(--brand-2); font-size:13px; font-weight:600; cursor:pointer; padding:0; margin-bottom:14px;}
  .stepper{display:flex; align-items:center; margin:16px 0 22px;}
  .step{display:flex; flex-direction:column; align-items:center; flex:1; position:relative;}
  .step .dot{width:15px; height:15px; border-radius:50%; background:var(--border); border:2px solid var(--border); z-index:2;}
  .step .lbl{font-size:11px; color:var(--ink-faint); margin-top:7px; font-weight:600; text-transform:uppercase;}
  .step .line{position:absolute; top:6px; left:50%; right:-50%; height:2px; background:var(--border); z-index:1;}
  .step:last-child .line{display:none;}
  .step.done .dot,.step.done .line{background:var(--brand-2); border-color:var(--brand-2);}
  .step.done .lbl{color:var(--brand-2);}
  .step.current .dot{background:var(--brand); border-color:var(--brand); box-shadow:0 0 0 4px var(--brand-soft);}
  .step.current .lbl{color:var(--brand);}
  .desc-box{background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:14px 16px; font-size:13.5px; line-height:1.55; margin-bottom:22px; white-space:pre-wrap;}
  .thread{display:flex; flex-direction:column; gap:12px; margin-bottom:22px;}
  .thread-item{border:1px solid var(--border); border-radius:8px; padding:12px 14px; background:#fff;}
  .thread-item.staff{background:var(--brand-soft); border-color:#CFE0EA;}
  .thread-item .t-head{display:flex; justify-content:space-between; font-size:12px; color:var(--ink-soft); margin-bottom:6px; gap:8px; flex-wrap:wrap;}
  .thread-item .t-head .who{font-weight:700; color:var(--ink);}
  .thread-item .t-body{font-size:13.5px; line-height:1.5; white-space:pre-wrap;}
  .resolve-box{border:1px solid var(--border); border-radius:9px; padding:16px; background:var(--surface-2);}
  .reopen-banner{background:var(--reopened-bg); color:var(--reopened); border:1px solid #F3C2D8; border-radius:8px; padding:10px 14px; font-size:12.5px; font-weight:600; margin-bottom:16px;}
  .gate{max-width:420px; margin:54px auto; text-align:center;}
  .gate h1{font-size:19px; color:var(--brand); margin-bottom:6px;}
  .gate p{font-size:13px; color:var(--ink-soft); margin-bottom:22px;}
  .gate .card{text-align:left;}
  .error-msg{background:#FBE1E1; color:var(--critical); border-radius:7px; padding:9px 12px; font-size:12.5px; margin-top:10px;}
  .ok-msg{background:var(--closed-bg); color:var(--closed); border-radius:7px; padding:9px 12px; font-size:12.5px; margin-top:10px;}
  .hint{font-size:11.5px; color:var(--ink-faint); margin-top:8px;}
  footer.app-footer{text-align:center; font-size:11.5px; color:var(--ink-faint); padding:18px; border-top:1px solid var(--border);}
  .announce-banner{display:flex; align-items:stretch; background:var(--brand); color:#fff; border-radius:var(--radius); overflow:hidden; margin-bottom:18px; border:1px solid #0a3251;}
  .announce-banner .ab-tag{display:flex; align-items:center; gap:7px; background:var(--gold); color:#3a2a0e; font-weight:800; font-size:12px; letter-spacing:.5px; text-transform:uppercase; padding:0 16px; white-space:nowrap;}
  .announce-banner .ab-viewport{flex:1; overflow:hidden; position:relative;}
  .announce-banner .ab-track{display:inline-flex; gap:48px; white-space:nowrap; padding:13px 0; animation:ab-scroll 60s linear infinite;}
  .announce-banner .ab-viewport:hover .ab-track{animation-play-state:paused;}
  .announce-banner .ab-item{font-size:13.5px;}
  .announce-banner .ab-item .ab-meta{color:#bcd3e2; font-size:11.5px; margin-left:8px;}
  @keyframes ab-scroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
  @media (prefers-reduced-motion:reduce){.announce-banner .ab-track{animation:none; white-space:normal;}}
  /* ===== Monitoring (mur d'écran) ===== */
  .monitor-wrap{width:100%;}
  .mon{background:#0b1322; color:#e7eef8; min-height:calc(100vh - 58px); padding:18px 22px;}
  .mon-kpis{display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin-bottom:16px;}
  @media (max-width:980px){.mon-kpis{grid-template-columns:repeat(3,1fr);}}
  .mon-kpi{background:#131f33; border:1px solid #20304a; border-radius:12px; padding:16px 18px;}
  .mon-kpi .n{font-family:var(--mono); font-size:36px; font-weight:800; line-height:1; color:#fff;}
  .mon-kpi .l{font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:#90a4c2; margin-top:7px;}
  .mon-kpi.amber .n{color:#ffb454;} .mon-kpi.blue .n{color:#5ca8ff;} .mon-kpi.violet .n{color:#b794f6;} .mon-kpi.pink .n{color:#f06fa6;} .mon-kpi.red .n{color:#ff6b6b;}
  .mon-grid{display:grid; grid-template-columns:2fr 1fr; gap:16px;}
  @media (max-width:980px){.mon-grid{grid-template-columns:1fr;}}
  .mon-panel{background:#101b2e; border:1px solid #20304a; border-radius:12px; padding:14px 16px; margin-bottom:16px;}
  .mon-panel h3{font-size:12px; text-transform:uppercase; letter-spacing:.7px; color:#9fb3d1; margin:0 0 12px;}
  table.mon-table{width:100%; border-collapse:collapse;}
  table.mon-table th{font-size:10.5px; text-transform:uppercase; letter-spacing:.5px; color:#7e93b3; text-align:left; padding:6px 8px; border-bottom:1px solid #21304a;}
  table.mon-table td{padding:10px 8px; border-bottom:1px solid #182539; font-size:14px; color:#d7e2f0; vertical-align:middle;}
  .mon-id{font-family:var(--mono); font-size:12px; color:#8fb4e6;}
  .mon-subj{font-weight:600;}
  .mon-age{font-family:var(--mono); font-size:13px;}
  .mon-age.over{color:#ff6b6b; font-weight:700;}
  .mon-foot{display:flex; justify-content:space-between; color:#7e93b3; font-size:12px; margin-top:6px; flex-wrap:wrap; gap:8px;}
  .mon-other{display:flex; gap:8px; flex-wrap:wrap;}
  .mon-other .chip{background:#16233a; border:1px solid #223150; border-radius:20px; padding:5px 11px; font-size:12px; color:#b9cae3;}
  @media print{ header.topbar, .no-print{display:none!important;} body{background:#fff;} main{max-width:none; padding:0;} .card{break-inside:avoid;} }
</style>

<script>
/* =========================================================================
   MEDLOG IT Ops — Frontend Phase 1 (Supabase)
   Auth: Supabase Auth · Données: PostgreSQL via supabase-js · Sécurité: RLS
   ========================================================================= */

// --- Connexion Supabase (clé anon/publishable = publique, protégée par la RLS) ---
const SB_URL = "https://awdaxjpijvegkjrgcjqk.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3ZGF4anBpanZlZ2tqcmdjanFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5OTAwMzUsImV4cCI6MjA5NzU2NjAzNX0.wHDI1JTaWs4MJmIhBy4ePu6P-rfPBta-5jiP34LfSko";
const sb = supabase.createClient(SB_URL, SB_KEY);

// --- Référentiels de repli (le dictionnaire en base prime) ---
const SERVICES_FALLBACK = ["MEDLOGIX","Access Rights and Passwords","Business Telephony","Internet (Wi-Fi, Network, Performance, etc.)","IT Equipment & Devices Procurement","MSC Global Citrix Platform and Global Applications (TMS, SAP, Cognos, etc.)","Office 365 (Outlook, Excel, Teams, SharePoint, etc.)","Printing and Scanning","Workstation (PC, Monitor, Accessories, Software, etc.)"];
const PRIORITIES_FALLBACK = ["Critical","High","Medium","Low"];
const MODULE_TREE = {
  "Freight Management": ["Quotation","Job","Trip Tracking","Payment Request","Supplier Invoice","Customer Invoice / Credit Note","General Service Charge","Charge Item","Charge Template","Event","Freight Job Query","Freight Quotation Query","Customer Invoice Query","Query – Sale & Cost Sheet","Contact","Debtors Credit Limit","Supplier"],
  "Arrivela": ["Job Planning","Vehicle Servicing Costs","Resource Unavailability","Trip Report","Vehicle Servicing Costs Report","Trip Tracking Report"],
  "Dashboard": ["Quotations Dashboard","Job Dashboard","Event Dashboard","Vehicle Dashboard","User Management","Revenue by Clients Report","HAD Report"]
};
const STATUSES = ["Pending","In Progress","Testing","Closed","Reopened"];
// Délais de résolution (SLA) par priorité, en HEURES, comptés depuis la création.
// Valeurs de secours si la priorité n'a pas de délai défini dans le Dictionnaire.
const SLA_HOURS = { Critical:4, High:24, Medium:72, Low:120 };
const SLA_DEFAULT_HOURS = 72; // priorité inconnue / non définie → 3 jours
function slaHours(t){
  const lk = state.lookups.find(l=>l.type==="priority" && l.value===t.priority);
  if(lk && lk.sla_hours!=null && lk.sla_hours!=="") return Number(lk.sla_hours);
  const v=SLA_HOURS[t.priority]; return (v==null)?SLA_DEFAULT_HOURS:v;
}
function fmtSla(h){ return h<24 ? (h+" h") : ((h%24===0?(h/24):(h/24).toFixed(1))+" j"); }
const ROLE_LABEL = { admin:"Admin", it_manager:"IT Manager", technician:"Technicien", asset_manager:"Gest. parc", store_keeper:"Magasinier", buyer:"Acheteur", project_manager:"Chef projet", approver:"Approbateur", user:"Utilisateur", viewer:"Lecture seule" };

// --- État ---
let state = {
  booting:true, session:null, profile:null, loadError:"",
  view:"dashboard", loginError:"",
  tickets:[], lookups:[], announcements:[], roles:[],
  selectedTicketId:null, ticketActivity:[], reopening:false,
  newService:"", filter:{status:"all", service:"all", priority:"all", search:""},
  dashPeriod:"this_month", customFrom:"", customTo:"",
  maintSubview:"annonces", lookupType:"service",
  adminUsers:[], usersLoaded:false,
  assets:[], assetCats:[], assetsLoaded:false, assetFilter:{cat:"all", status:"all", search:""},
  selectedAssetId:null, assetNew:false, assetMovements:[], profilesList:[],
  stockItems:[], stockLoaded:false, stockSubview:"inventory", stockSearch:"", stockMoves:[], locations:[], locationsLoaded:false,
  selectedStockId:null, stockNew:false,
  prs:[], prLoaded:false, prItems:[], selectedPrId:null, prNew:false, prDraftItems:[], departments:[], departmentsLoaded:false,
  pos:[], vendors:[], vendorsLoaded:false, procSubview:"requests", selectedPoId:null, poItems:[],
  poReceipts:[], receivedByItem:{}, poReceiving:false,
  projects:[], projectsLoaded:false, projectFilter:{status:"all", search:""}, selectedProjectId:null, projectNew:false, projectTasks:[],
  execLoaded:false, execData:null,
  reportSource:"tickets", reportFilters:{}, reportRows:null, reportRunning:false, reportError:null,
  canInstall:false,
  settings:{}, settingsLoaded:false,
  groups:[], groupPerms:[], selectedGroupId:null
};

// --- Utilitaires ---
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmtDate(v){ const d=new Date(v); return isNaN(d)?"—":(d.toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"})+" · "+d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})); }
function daysSince(v){ return Math.floor((Date.now()-new Date(v).getTime())/86400000); }
function hoursSince(v){ return (Date.now()-new Date(v).getTime())/3600000; }
function ticketDeadline(t){ return new Date(new Date(t.created_at).getTime() + slaHours(t)*3600000); }
function isOverdue(t){ return t.status!=="Closed" && hoursSince(t.created_at) >= slaHours(t); }
function statusClass(s){ return {"Pending":"pending","In Progress":"progress","Testing":"testing","Closed":"closed","Reopened":"reopened"}[s]||"pending"; }
function statusRowClass(s){ return "status-"+String(s).replace(/\s+/g,"-"); }
function priorityRank(p){ return {"Critical":0,"High":1,"Medium":2,"Low":3}[p] ?? 4; }
function statusRank(s){ return {"Reopened":0,"Pending":1,"In Progress":2,"Testing":3,"Closed":4}[s] ?? 5; }
function roleName(){ return state.profile && state.profile.role ? state.profile.role.name : (state.profile?state.profile.role_name:null); }
function isAdmin(){ return roleName()==="admin"; }
function myGroupId(){ return state.profile ? state.profile.group_id : null; }
// Lecture de la grille groupe × écran × action. L'admin a toujours accès complet.
function can(screen, act){
  if(isAdmin()) return true;
  const gid=myGroupId(); if(!gid) return false;
  const p=state.groupPerms.find(x=>x.group_id===gid && x.screen===screen);
  if(!p) return false;
  return act==="view"?!!p.can_view : act==="create"?!!p.can_create : act==="edit"?!!p.can_edit : act==="delete"?!!p.can_delete : false;
}
function canWrite(screen){ return can(screen,"create")||can(screen,"edit")||can(screen,"delete"); }
// Le droit de "modifier" les tickets = équipe support (voit tous les tickets, peut affecter/changer le statut).
function isStaff(){ return isAdmin() || can("tickets","edit"); }
function canViewAssets(){ return can("assets","view"); }
function canEditAssets(){ return canWrite("assets"); }
function canViewStock(){ return can("stock","view"); }
function canMoveStock(){ return canWrite("stock"); }
function canViewProcurement(){ return can("procurement","view"); }
function canCreatePr(){ return can("procurement","create"); }
function canViewProjects(){ return can("projects","view"); }
function canManageProjects(){ return canWrite("projects"); }
function canViewExec(){ return can("exec","view"); }
function canViewReports(){ return can("reports","view"); }

// Registre des paramètres éditables depuis l'écran admin "Paramètres".
// Pour en ajouter un : 1) une ligne ici, 2) l'utiliser via setting()/settingNum(),
// 3) (optionnel) une valeur initiale dans le script SQL app_settings.
const SETTINGS_DEFS = [
  { key:"warranty_warning_days",        cat:"Alertes",      type:"number", def:30,      min:1,  label:"Alerte garantie — anticipation (jours)", help:"Une garantie est signalée « bientôt expirée » ce nombre de jours avant son échéance." },
  { key:"reset_default_password",       cat:"Sécurité",     type:"text",   def:"medlog",        label:"Mot de passe de réinitialisation",       help:"Mot de passe attribué quand l'admin réinitialise un compte. L'utilisateur devra le changer à la connexion." },
  { key:"monitor_data_refresh_seconds", cat:"Mur d'écran",  type:"number", def:10,      min:3,  label:"Rafraîchissement des données (secondes)", help:"Fréquence de mise à jour des tickets sur le mur de supervision." },
  { key:"monitor_full_reload_minutes",  cat:"Mur d'écran",  type:"number", def:5,       min:1,  label:"Rechargement complet (minutes)",          help:"Filet de sécurité : la page du mur se recharge entièrement à cet intervalle." },
  { key:"monitor_banner_speed",         cat:"Mur d'écran",  type:"number", def:42,      min:10, label:"Vitesse du bandeau (pixels/seconde)",     help:"Vitesse de défilement des annonces sur le mur de supervision." },
];
function setting(key){ const d=SETTINGS_DEFS.find(s=>s.key===key)||{}; const v=state.settings?state.settings[key]:undefined; return (v==null||v==="")?d.def:v; }
function settingNum(key){ const n=Number(setting(key)); if(!isNaN(n)) return n; const d=SETTINGS_DEFS.find(s=>s.key===key)||{}; return d.def; }
async function fetchSettings(){
  try{ const { data } = await sb.from("app_settings").select("key,value"); const m={}; (data||[]).forEach(r=>{ m[r.key]=r.value; }); state.settings=m; state.settingsLoaded=true; }
  catch(_){ state.settingsLoaded=true; }
}

function periodRange(){
  const now=new Date(); const out={from:0,to:Date.now()+1};
  const sod=d=>{const x=new Date(d);x.setHours(0,0,0,0);return x.getTime();};
  const eod=d=>{const x=new Date(d);x.setHours(23,59,59,999);return x.getTime();};
  switch(state.dashPeriod){
    case "today": out.from=sod(now); out.to=eod(now); break;
    case "yesterday": { const y=new Date(now); y.setDate(y.getDate()-1); out.from=sod(y); out.to=eod(y); break; }
    case "last7": { const s=new Date(now); s.setDate(s.getDate()-6); out.from=sod(s); out.to=eod(now); break; }
    case "this_month": out.from=new Date(now.getFullYear(),now.getMonth(),1).getTime(); out.to=eod(now); break;
    case "prev_month": out.from=new Date(now.getFullYear(),now.getMonth()-1,1).getTime(); out.to=new Date(now.getFullYear(),now.getMonth(),0,23,59,59,999).getTime(); break;
    case "this_year": out.from=new Date(now.getFullYear(),0,1).getTime(); out.to=eod(now); break;
    case "custom": out.from=state.customFrom?sod(new Date(state.customFrom)):0; out.to=state.customTo?eod(new Date(state.customTo)):Date.now()+1; break;
  }
  return out;
}
function inPeriod(t){ const r=periodRange(); const ms=new Date(t.created_at).getTime(); return ms>=r.from && ms<=r.to; }

function render(){
  document.getElementById("app").innerHTML = renderApp();
  try{ ensureMonitorTimers(); }catch(e){}
  try{ bindEvents(); }catch(e){}
  try{ applyBannerSpeed(); }catch(e){}
}
// Mur d'écran 24/7 : quand l'onglet/écran redevient visible, on force une actualisation
// et on relance les minuteurs (les navigateurs throttlent les onglets en arrière-plan).
document.addEventListener("visibilitychange", ()=>{
  if(!document.hidden && isMonitor()){
    ensureMonitorTimers();
    monRefresh().catch(()=>{});
  }
});

// Vitesse de défilement constante et lente, quelle que soit la longueur de l'annonce.
function applyBannerSpeed(){
  const SPEED = settingNum("monitor_banner_speed"); // pixels/seconde (paramétrable)
  document.querySelectorAll(".ab-track").forEach(tr=>{
    const half = tr.scrollWidth/2;            // une séquence (le contenu est doublé)
    if(half>0){ tr.style.animationDuration = Math.max(22, half/SPEED).toFixed(1)+"s"; }
  });
}
window.addEventListener("resize", ()=>{ applyBannerSpeed(); });

function isMonitor(){ return roleName()==="viewer"; }
let monDataTimer=null, monClockTimer=null, monReloadTimer=null;
let monBannerSig=null;
function viewerAnnSig(){ try{ return JSON.stringify(announcementsForViewer().map(a=>[a.id,a.title,a.body,a.audience,a.is_active])); }catch(e){ return ""; } }
async function monRefresh(){
  const [tk, an] = await Promise.all([ fetchTickets(), fetchAnnouncements() ]);
  state.tickets=tk; state.announcements=an; state.lastSync=Date.now();
  if(state.view==="monitor"){
    const dyn=document.getElementById("mon-dynamic");
    if(!dyn){ render(); return; }
    dyn.innerHTML=monDynamicHtml();
    // Bandeau d'annonces : reconstruit uniquement si le contenu a changé, pour ne pas casser le défilement.
    const sig=viewerAnnSig(); const bn=document.getElementById("mon-banner");
    if(bn && sig!==monBannerSig){ bn.innerHTML=announcementBanner(announcementsForViewer()); monBannerSig=sig; applyBannerSpeed(); }
  } else if(state.view==="announces"){
    // Onglet « Annonces de mise à jour » : on ne redessine que si les annonces ont changé.
    const sig=viewerAnnSig();
    if(sig!==monBannerSig){ monBannerSig=sig; render(); }
  } else { render(); }
}
function ensureMonitorTimers(){
  const on = isMonitor() && !state.booting;
  if(on && monBannerSig===null){ monBannerSig=viewerAnnSig(); }
  if(on && !monDataTimer){
    monDataTimer = setInterval(async ()=>{
      if(!isMonitor()){ clearInterval(monDataTimer); monDataTimer=null; return; }
      try{ await monRefresh(); }
      catch(e){ const el=document.getElementById("mon-sync"); if(el) el.textContent=" · ⚠ synchro impossible — nouvelle tentative…"; }
    }, settingNum("monitor_data_refresh_seconds")*1000);
  }
  if(on && !monClockTimer){
    monClockTimer = setInterval(()=>{ const c=document.getElementById("mon-clock"); if(c) c.textContent=new Date().toLocaleTimeString("fr-FR"); }, 1000);
  }
  if(on && !monReloadTimer){
    // Filet de sécurité infaillible : rechargement complet de la page toutes les 5 minutes.
    monReloadTimer = setInterval(()=>{ if(isMonitor()) location.reload(); }, settingNum("monitor_full_reload_minutes")*60000);
  }
  if(!on){
    if(monDataTimer){clearInterval(monDataTimer);monDataTimer=null;}
    if(monClockTimer){clearInterval(monClockTimer);monClockTimer=null;}
    if(monReloadTimer){clearInterval(monReloadTimer);monReloadTimer=null;}
  }
}

// --- Boot / Auth ---
async function init(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ state.session=session; await afterLogin(); }
  else { state.booting=false; render(); }
  sb.auth.onAuthStateChange((event, sess)=>{
    if(event==="SIGNED_OUT"){ state.session=null; state.profile=null; render(); }
  });
}
async function afterLogin(){
  try{
    await loadProfile();
    await loadData();
    state.loadError="";
  }catch(e){ state.loadError = e.message||String(e); }
  state.booting=false;
  state.view = isMonitor() ? "monitor" : "dashboard";
  // Mur d'écran : restaurer l'onglet courant après un rechargement complet (mémorisé dans l'URL).
  if(isMonitor()){
    const h=(location.hash||"").replace("#","");
    state.view = ["monitor","report","announces"].includes(h) ? h : "monitor";
  }
  // Écran d'accueil : pour un non-admin, le premier écran autorisé par son groupe.
  if(state.profile && !isMonitor() && !isAdmin()){
    const ng=navGroups(); const allowed=ng.flatMap(g=>g.leaves.filter(lf=>lf.show()).map(lf=>lf.v));
    if(allowed.length && !allowed.includes(state.view)) state.view=allowed[0];
  }
  // Lien profond : ?ticket=INC... ouvre directement le ticket concerné.
  const tkParam = isMonitor() ? null : new URLSearchParams(location.search).get("ticket");
  if(tkParam && !state.loadError){
    const t = state.tickets.find(x=> (x.ticket_no||"")===tkParam || x.id===tkParam);
    state.view="tickets";
    if(t) state.selectedTicketId=t.id;
    try{ history.replaceState(null,"",location.pathname); }catch(_){}
    render();
    if(t) loadActivity(t.id);
    return;
  }
  render();
}
async function loadProfile(){
  const { data, error } = await sb.from("profiles").select("*, role:roles(name)").eq("id", state.session.user.id).single();
  if(error) throw error;
  state.profile = data;
}
async function loadData(){
  const [tk, lk, an, profs] = await Promise.all([ fetchTickets(), fetchLookups(), fetchAnnouncements(),
    sb.from("profiles").select("id, full_name, first_name, last_name, email").eq("is_active",true).order("full_name"), fetchSettings(), fetchGroups() ]);
  state.tickets=tk; state.lookups=lk; state.announcements=an; state.profilesList=profs.data||[];
  if(!state.newService) state.newService = getServices()[0];
}
async function fetchTickets(){
  const { data, error } = await sb.from("tickets")
    .select("*, requester:requester_id(full_name,email), assignee:assignee_id(full_name)")
    .order("created_at",{ascending:false});
  if(error) throw error; return data||[];
}
async function fetchLookups(){
  const { data } = await sb.from("lookups").select("*").eq("is_active",true).order("sort_order");
  return data||[];
}
async function fetchAnnouncements(){
  const { data } = await sb.from("announcements").select("*, author:author_id(full_name)").eq("is_active",true).order("publish_date",{ascending:false});
  return data||[];
}
async function reloadTickets(){ state.tickets = await fetchTickets(); }

  }
  if(state.profile && isMonitor() && !state.booting && !state.loadError){
    return `${renderHeader()}<div class="monitor-wrap">${renderMain()}</div>`;
  }
  return `${renderHeader()}<main>${renderMain()}</main><footer class="app-footer">MEDLOG IT Ops v1.0 · © ${new Date().getFullYear()}</footer>`;
}
function renderHeader(){
  let nav="", session="";
  if(state.profile && isMonitor()){
    nav=`<div class="topnav">
      <button data-action="mon-nav" data-view="monitor" class="${state.view==='monitor'?'active':''}">Monitoring</button>
      <button data-action="mon-nav" data-view="report" class="${state.view==='report'?'active':''}">Rapport</button>

      <button class="link" data-action="refresh-now">actualiser</button>
      <button class="link" data-action="fullscreen">plein écran</button>
      <button class="link" data-action="logout">quitter</button></div>`;

    const r=roleName();
    if(state.profile.must_change_password){
      session=`<div class="session-info"><span class="role-chip">${ROLE_LABEL[r]||r}</span>${esc(myName())}<button class="link" data-action="logout">déconnexion</button></div>`;

    const groups=navGroups();

    nav=`<div class="topnav">${groups.map(g=>{
      const first=g.leaves.find(lf=>lf.show())||g.leaves[0];
      return `<button data-action="nav" data-view="${first.v}" class="${active(g)?'active':''}">${g.label}</button>`;
    }).join("")}</div>`;
    session=`<div class="session-info"><span class="role-chip">${ROLE_LABEL[r]||r}</span>${esc(myName())}<button class="link" data-action="nav" data-view="account">mon compte</button><button class="link" data-action="logout">déconnexion</button></div>`;
    }
  }
  const installBtn = state.canInstall ? `<button class="no-print" data-action="install-app" title="Installer l'application sur ce poste" style="border:1px solid rgba(255,255,255,.55);border-radius:6px;padding:5px 11px;color:#fff;background:transparent;cursor:pointer;font-size:13px;white-space:nowrap;">⬇ Installer l'app</button>` : "";
  return `<header class="topbar"><div class="brand"><div class="mark">ML</div><div><div class="name">MEDLOG IT Ops</div><div class="sub">${isMonitor()?"Monitoring":"Support Desk"}</div></div></div>${nav}<div class="topbar-right" style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">${installBtn}${session}</div></header>`;
}
function navGroups(){
  const r=roleName();
  return [
    { key:"board", label:"Tableau de bord", leaves:[
        {v:"dashboard", l:"Opérationnel", show:()=>canViewDashboard()},
        {v:"exec", l:"Direction", show:()=>canViewExec()},
        {v:"reports", l:"Rapports", show:()=>canViewReports()} ] },
    { key:"tickets", label:(r==="user"?"Mes tickets":"Tickets"), leaves:[ {v:"tickets", l:"Tickets", show:()=>canViewTickets()} ] },
    { key:"resources", label:"Ressources", leaves:[
        {v:"assets", l:"Actifs", show:()=>canViewAssets()},
        {v:"stock", l:"Stock", show:()=>canViewStock()},
        {v:"procurement", l:"Achats", show:()=>canViewProcurement()} ] },
    { key:"projects", label:"Projets", leaves:[ {v:"projects", l:"Projets", show:()=>canViewProjects()} ] },
    { key:"maint", label:"Maintenance", leaves:[ {v:"maintenance", l:"Maintenance", show:()=>isAdmin()} ] },
  ].filter(g=> g.leaves.some(lf=>lf.show()));
}
function sectionSubnav(){
  const g=navGroups().find(x=>x.leaves.some(lf=>lf.v===state.view));
  if(!g) return "";
  const vis=g.leaves.filter(lf=>lf.show());
  if(vis.length<2) return "";
  return `<div class="subnav" style="margin-bottom:14px;">${vis.map(lf=>`<button data-action="nav" data-view="${lf.v}" class="${state.view===lf.v?'active':''}">${lf.l}</button>`).join("")}</div>`;
}
function renderMain(){
  if(state.booting) return `<div class="gate"><h1>Chargement…</h1><p>Connexion à la base sécurisée.</p></div>`;
  if(!state.session || !state.profile) return renderLogin();
  if(state.loadError) return `<div class="gate"><h1>Erreur de chargement</h1><div class="card"><div class="error-msg">${esc(state.loadError)}</div><button class="btn" data-action="retry" style="margin-top:12px;">Réessayer</button></div></div>`;
  if(isMonitor()) return state.view==="report" ? renderReport() : state.view==="announces" ? renderMonitorAnnonces() : renderMonitor();
  // Étape 2 — accès piloté par les groupes (l'admin a toujours accès complet).
  const navg=navGroups();
  const allowed=navg.flatMap(g=>g.leaves.filter(lf=>lf.show()).map(lf=>lf.v));
  if(!isAdmin() && allowed.length===0){
    return `<div class="gate"><h1>Accès non configuré</h1><div class="card"><p>Votre compte n'a pas encore de groupe d'accès, ou ce groupe n'autorise aucun écran.</p><p style="color:var(--ink-soft);">Contactez votre administrateur.</p></div></div>`;
  }
  if(state.view!=="account" && !allowed.includes(state.view)) state.view = allowed[0];
  const sub=sectionSubnav();
  if(state.view==="account") return renderAccount();
  if(state.view==="dashboard") return canViewDashboard()?sub+renderDashboard():"";
  if(state.view==="exec") return canViewExec()?sub+renderExec():"";
  if(state.view==="reports") return canViewReports()?sub+renderReports():"";
  if(state.view==="tickets") return canViewTickets()?renderTicketsArea():"";
  if(state.view==="assets") return canViewAssets()?sub+renderAssetsArea():"";
  if(state.view==="stock") return canViewStock()?sub+renderStockArea():"";
  if(state.view==="procurement") return canViewProcurement()?sub+renderProcurementArea():"";
  if(state.view==="projects") return canViewProjects()?renderProjectsArea():"";
  if(state.view==="maintenance") return isAdmin()?renderMaintenance():"";
  return "";
}

function announcementBanner(list){
  if(!list||!list.length) return "";
  const item=a=>`<span class="ab-item"><strong>${esc(a.title)}</strong>${a.body?(" — "+esc(a.body)):""}<span class="ab-meta">${esc(a.author?a.author.full_name:"")}${a.publish_date?(" · "+new Date(a.publish_date).toLocaleDateString("fr-FR")):""}</span></span>`;
  const seq=list.map(item).join("");
  return `<div class="announce-banner"><div class="ab-tag">📢 Infos</div><div class="ab-viewport"><div class="ab-track">${seq}${seq}</div></div></div>`;
}
function scoped(){ return state.tickets.filter(inPeriod); }
function renderDashboard(){
  const data=scoped(); const c=s=>data.filter(t=>t.status===s).length;
  const periods=[["today","Aujourd'hui"],["yesterday","Hier"],["last7","7 derniers jours"],["this_month","Ce mois"],["prev_month","Mois précédent"],["this_year","Cette année"],["custom","Personnalisée"]];
  const periodSelect=`<select id="dash-period">${periods.map(([v,l])=>`<option value="${v}" ${state.dashPeriod===v?'selected':''}>${l}</option>`).join("")}</select>`;
  const customRange=state.dashPeriod==="custom"?`<div class="field" style="margin-bottom:0;"><label>Du</label><input type="date" id="cf" value="${esc(state.customFrom)}"></div><div class="field" style="margin-bottom:0;"><label>Au</label><input type="date" id="ct" value="${esc(state.customTo)}"></div>`:"";
  const avg=avgResolution(data);
  const kpis=`<div class="stat-row">
    <div class="stat"><div class="n">${data.length}</div><div class="l">Total tickets</div></div>

    <div class="card"><div class="section-label">Par service</div>${barList(groupCount(data,t=>t.service))}</div>

  </div><div class="two-col">

    <div class="card"><div class="section-label">Par statut</div>${barList(groupCount(data,t=>t.status))}</div>
  </div>`;
  const active=data.filter(t=>["In Progress","Testing","Reopened"].includes(t.status)).sort((a,b)=>statusRank(a.status)-statusRank(b.status)||priorityRank(a.priority)-priorityRank(b.priority));

    <div class="filters"><div class="field" style="margin-bottom:0;"><label>Période</label>${periodSelect}</div>${customRange}</div>
    ${kpis}${activeBlock}${charts}${recentBlock}`;
}
function avgResolution(data){ const ds=data.filter(t=>t.status==="Closed"&&t.closed_at).map(t=>(new Date(t.closed_at)-new Date(t.created_at))/86400000); return ds.length?ds.reduce((a,b)=>a+b,0)/ds.length:null; }
function groupCount(data,fn){ const m={}; data.forEach(t=>{const k=fn(t)||"—"; m[k]=(m[k]||0)+1;}); return Object.keys(m).map(k=>({label:k,count:m[k]})).sort((a,b)=>b.count-a.count); }
function barList(items){ if(!items.length) return `<div class="empty-state">Aucune donnée.</div>`; const max=Math.max(1,...items.map(i=>i.count)); return `<div class="bars">${items.map(i=>`<div class="bar-row"><div class="b-label" title="${esc(i.label)}">${esc(i.label)}</div><div class="b-track"><div class="b-fill" style="width:${Math.round(i.count/max*100)}%"></div></div><div class="b-count">${i.count}</div></div>`).join("")}</div>`; }

// =========================== DIRECTION (Phase 5 — tableau de bord exécutif) ===========================
async function loadExec(){
  try{
    const soon=new Date(); soon.setDate(soon.getDate()+settingNum("warranty_warning_days")); const soonISO=soon.toISOString().slice(0,10); const todayISO=new Date().toISOString().slice(0,10);
    const [assets, stock, prs, pos, projects] = await Promise.all([
      sb.from("assets").select("id,name,asset_tag,status,warranty_expiry,assigned_user_id"),
      sb.from("stock_items").select("id,name,quantity,min_threshold,unit").eq("is_active",true),
      sb.from("purchase_requests").select("id,status,estimated_cost"),
      sb.from("purchase_orders").select("id,po_no,status,amount"),
      sb.from("projects").select("id,project_no,name,status,progress_pct,end_date")
    ]);
    state.execData={
      assets:assets.data||[], stock:stock.data||[], prs:prs.data||[], pos:pos.data||[], projects:projects.data||[],
      soonISO, todayISO
    };
    state.execLoaded=true; render();
  }catch(e){ state.execData=null; state.execLoaded=true; render(); }
}

  if(!state.execLoaded){ loadExec(); return `<div class="empty-state">Consolidation des données…</div>`; }

  const tk=state.tickets||[];
  const tkOpen=tk.filter(t=>t.status!=="Closed").length, tkOver=tk.filter(isOverdue).length;
  const aAssigned=d.assets.filter(a=>a.status==="Assigned").length, aStock=d.assets.filter(a=>a.status==="In Stock").length;
  const aWarranty=d.assets.filter(a=>a.warranty_expiry && a.warranty_expiry<=d.soonISO && a.warranty_expiry>=d.todayISO).length;
  const aExpired=d.assets.filter(a=>a.warranty_expiry && a.warranty_expiry<d.todayISO).length;
  const low=d.stock.filter(s=>Number(s.quantity)<Number(s.min_threshold||0)).length;

function renderExecAlerts(d){
  const tk=state.tickets||[];
  const today=d.todayISO, soon=d.soonISO;
  const overdue=tk.filter(isOverdue).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  const expired=d.assets.filter(a=>a.warranty_expiry && a.warranty_expiry<today);
  const expiring=d.assets.filter(a=>a.warranty_expiry && a.warranty_expiry>=today && a.warranty_expiry<=soon);
  const low=d.stock.filter(s=>Number(s.quantity)<Number(s.min_threshold||0));
  const lateProj=d.projects.filter(p=>p.end_date && p.status!=="Completed" && p.status!=="Cancelled" && p.end_date<today);
  const groups=[
    { t:"Tickets en retard", items:overdue.map(x=>`${esc(x.ticket_no||"")} — ${esc(x.subject)}`), c:"#d9534f" },
    { t:"Garanties expirées", items:expired.map(a=>`${esc(a.name)} (${esc(a.asset_tag||"")})`), c:"#d9534f" },
    { t:`Garanties < ${settingNum("warranty_warning_days")} jours`, items:expiring.map(a=>`${esc(a.name)} — échéance ${esc(a.warranty_expiry)}`), c:"#e0a800" },
    { t:"Stock sous le seuil", items:low.map(s=>`${esc(s.name)} : ${esc(s.quantity)} ${esc(s.unit||"")} (min ${esc(s.min_threshold)})`), c:"#e0a800" },
    { t:"Projets en retard", items:lateProj.map(p=>`${esc(p.name)} — échéance ${esc(p.end_date)}`), c:"#d9534f" },
  ].filter(g=>g.items.length);
  const total=groups.reduce((a,g)=>a+g.items.length,0);
  if(!total) return `<div class="card" style="margin-bottom:16px;border-left:4px solid #2e9e5b;"><div class="section-label">Centre d'alertes</div><div style="font-size:13.5px;color:#1e7e34;">Aucune alerte active. Tout est sous contrôle. ✅</div></div>`;
  const block=g=>{
    const shown=g.items.slice(0,5).map(x=>`<li style="margin:2px 0;">${x}</li>`).join("");
    const more=g.items.length>5?`<li style="list-style:none;color:var(--ink-soft);font-size:12px;">+ ${g.items.length-5} autre(s)…</li>`:"";
    return `<div style="margin-bottom:10px;"><div style="font-weight:600;font-size:13px;color:${g.c};display:flex;align-items:center;gap:8px;"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${g.c};"></span>${g.t} <span style="color:var(--ink-soft);font-weight:400;">(${g.items.length})</span></div><ul style="margin:4px 0 0 18px;font-size:13px;">${shown}${more}</ul></div>`;
  };
  return `<div class="card" style="margin-bottom:16px;border-left:4px solid #d9534f;"><div class="section-label">Centre d'alertes — ${total} point(s) à traiter</div>${groups.map(block).join("")}</div>`;
}

function renderReports(){

    if(ft.type==="lowstock"){ const cur=f._lowstock||"all";
      return field(ft.label, `<select data-rf="_lowstock"><option value="all" ${cur==='all'?'selected':''}>Tous</option><option value="yes" ${cur==='yes'?'selected':''}>Sous le seuil</option></select>`); }

async function runReport(){
  const cfg=REPORTS[state.reportSource], f=state.reportFilters||{};
  let q=sb.from(cfg.table).select(cfg.select);
  if(cfg.baseEq) Object.entries(cfg.baseEq).forEach(([k,v])=>{ q=q.eq(k,v); });
  cfg.filters.forEach(ft=>{
    if(ft.field.startsWith("_")) return; // filtre client
    const v=f[ft.field];
    if(ft.type==="select"){ if(v && v!=="all") q=q.eq(ft.field,v); }
    else if(ft.type==="text"){ if(v && v.trim()) q=q.ilike(ft.field,`%${v.trim()}%`); }
    else if(ft.type==="daterange"){ const du=f[ft.field+"_du"], au=f[ft.field+"_au"]; if(du) q=q.gte(ft.field,du); if(au) q=q.lte(ft.field,au+"T23:59:59"); }
  });
  if(cfg.dateField) q=q.order(cfg.dateField,{ascending: cfg.dateField==="name"});
  q=q.limit(5000);
  state.reportRunning=true; state.reportError=null; render();
  try{
    let { data, error } = await q; if(error) throw error;
    data=data||[];
    if(f._lowstock==="yes") data=data.filter(r=>num(r.quantity)<num(r.min_threshold));
    state.reportRows=data; state.reportRunning=false; render();
  }catch(e){ state.reportRunning=false; state.reportError="Erreur : "+(e.message||String(e)); render(); }
}
function exportReport(fmt){
  const cfg=REPORTS[state.reportSource], rows=state.reportRows||[];
  if(!rows.length) return;
  const data=rows.map(r=>{ const o={}; cfg.columns.forEach(c=>{ o[c.k]=c.g(r); }); return o; });
  const fname=`Rapport_${cfg.label.replace(/[^a-zA-Z0-9]/g,"_")}_${new Date().toISOString().slice(0,10)}`;
  if(fmt==="xlsx" && window.XLSX){
    const ws=XLSX.utils.json_to_sheet(data, {header:cfg.columns.map(c=>c.k)});
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Rapport");
    XLSX.writeFile(wb, fname+".xlsx"); return;
  }
  const cols=cfg.columns.map(c=>c.k);
  const cell=v=>{ v=(v==null?"":String(v)); return /[",;\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; };
  const lines=[cols.join(";")].concat(data.map(o=>cols.map(c=>cell(o[c])).join(";")));
  const blob=new Blob(["\ufeff"+lines.join("\r\n")],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=fname+".csv"; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1500);
}

}

// =========================== STOCK (Phase 2 — tranche 3) ===========================
const STOCK_MOVE_TYPES=[["receipt","Réception (+)"],["transfer","Transfert"],["issue","Sortie (−)"],["return","Retour (+)"],["adjustment","Ajustement (=)"]];
function moveTypeLabel(t){ const x=STOCK_MOVE_TYPES.find(m=>m[0]===t); return x?x[1]:t; }
function locName(id){ const l=state.locations.find(x=>x.id===id); return l?l.name:"—"; }
function isLowStock(it){ return Number(it.quantity) < Number(it.min_threshold||0); }

async function loadStock(){
  try{
    const [items, locs, cats] = await Promise.all([
      sb.from("stock_items").select("*, category:category_id(name), location:location_id(name)").eq("is_active",true).order("name"),
      sb.from("locations").select("*").eq("is_active",true).order("name"),
      sb.from("asset_categories").select("*").order("name")
    ]);
    state.stockItems=items.data||[]; state.locations=locs.data||[]; state.assetCats=cats.data||state.assetCats; state.stockLoaded=true; render();
  }catch(e){ state.stockItems=[]; state.stockLoaded=true; render(); }
}
async function reloadStock(){
  const { data } = await sb.from("stock_items").select("*, category:category_id(name), location:location_id(name)").eq("is_active",true).order("name");
  state.stockItems=data||[];
}
async function loadStockMoves(id){
  const { data } = await sb.from("stock_movements").select("*").eq("item_id",id).order("created_at",{ascending:false});
  state.stockMoves=data||[];
  if(state.selectedStockId===id) render();
}

function renderStockArea(){
  if(!state.stockLoaded){ loadStock(); return `<div class="empty-state">Chargement du stock…</div>`; }
  if(state.selectedStockId){ const it=state.stockItems.find(x=>x.id===state.selectedStockId); if(it) return `<button class="back-link" data-action="stock-back">&larr; Retour</button>`+renderStockDetail(it); state.selectedStockId=null; }
  if(state.stockNew && canMoveStock()) return `<button class="back-link" data-action="stock-cancel">&larr; Retour à l'inventaire</button>`+renderStockForm();
  const sub=`<div class="subnav">
    <button data-action="stock-subview" data-view="inventory" class="${state.stockSubview==='inventory'?'active':''}">Inventaire</button>
    <button data-action="stock-subview" data-view="alerts" class="${state.stockSubview==='alerts'?'active':''}">Alertes${state.stockItems.filter(isLowStock).length?` (${state.stockItems.filter(isLowStock).length})`:""}</button>
  </div>`;
  return sub + (state.stockSubview==="alerts" ? renderStockAlerts() : renderStockInventory());
}

function stockRow(it){
  const low=isLowStock(it);
  return `<div class="ticket-row" data-action="open-stock" data-id="${it.id}" style="${low?'border-left-color:var(--critical);':''}">
    <div class="col-main"><div class="subject">${esc(it.name)} ${it.sku?`<span class="ticket-id">${esc(it.sku)}</span>`:""}</div>
      <div class="meta"><span class="badge svc">${esc(it.category?it.category.name:"—")}</span><span>${it.location?esc(it.location.name):""}</span><span>Seuil min : ${esc(it.min_threshold||0)}</span></div></div>
    <div class="col-status"><span class="badge ${low?'overdue':'closed'}">${esc(it.quantity)} ${esc(it.unit||"")}</span>${low?`<span class="badge overdue">Sous le seuil</span>`:""}</div></div>`;
}
function renderStockInventory(){
  let list=state.stockItems.slice();
  if(state.stockSearch.trim()){ const q=state.stockSearch.toLowerCase(); list=list.filter(it=>(it.name||"").toLowerCase().includes(q)||(it.sku||"").toLowerCase().includes(q)); }
  const newBtn=canMoveStock()?`<button class="btn secondary" data-action="stock-new">+ Nouvel article</button>`:"";

    ${list.length?`<div class="ticket-list">${list.map(stockRow).join("")}</div>`:`<div class="empty-state">Aucun article.</div>`}`;
}
function renderStockAlerts(){
  const low=state.stockItems.filter(isLowStock);
  return `<h1 class="page-title">Alertes de stock</h1><p class="page-sub">Articles dont la quantité est inférieure au seuil minimum.</p>
    ${low.length?`<div class="ticket-list">${low.map(stockRow).join("")}</div>`:`<div class="empty-state">Aucune alerte — tous les articles sont au-dessus de leur seuil. ✅</div>`}`;
}

function renderStockForm(){
  const catOptions=state.assetCats.slice().sort((a,b)=>(a.parent_id?1:0)-(b.parent_id?1:0)||a.name.localeCompare(b.name)).map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join("");

        <div class="field"><label for="st-loc">Site</label><select id="st-loc">${locOptions}</select></div>
      </div>
      <div class="field-row">
        <div class="field"><label for="st-qty">Quantité initiale</label><input type="text" id="st-qty" placeholder="0"></div>
        <div class="field"><label for="st-min">Seuil minimum</label><input type="text" id="st-min" placeholder="0"></div>
      </div>
      <div class="field" style="max-width:220px;"><label for="st-unit">Unité</label><select id="st-unit">${lkVals("stock_unit",["pièce","boîte","mètre","kilogramme","litre","rouleau","paquet","lot"]).map(u=>`<option value="${esc(u)}">${esc(u)}</option>`).join("")}</select></div>
      <div id="st-error"></div>
      <button class="btn" data-action="submit-stock">Créer l'article</button>
    </div>`;
}

function renderStockDetail(it){
  const editable=canMoveStock();
  const low=isLowStock(it);
  const typeOpts=STOCK_MOVE_TYPES.map(([v,l])=>`<option value="${v}">${l}</option>`).join("");

  const moves=(state.stockMoves||[]).map(m=>{

    return `<div class="thread-item"><div class="t-head"><span class="who">${esc(moveTypeLabel(m.type))} ${sign}${esc(m.qty)}</span><span>${fmtDate(m.created_at)}</span></div><div class="t-body" style="color:var(--ink-soft);font-size:12.5px;">${esc(userName(m.actor_id))}${m.reference?` · ${esc(m.reference)}`:""}${m.to_location_id?` · → ${esc(locName(m.to_location_id))}`:""}</div></div>`;
  }).join("");
  let moveCard="";
  if(editable){
    moveCard=`<div class="card"><div class="section-label">Enregistrer un mouvement</div>
      <div class="field-row">
        <div class="field"><label for="sm-type">Type</label><select id="sm-type" onchange="onStockTypeChange()">${typeOpts}</select></div>
        <div class="field"><label for="sm-qty">Quantité</label><input type="text" id="sm-qty" placeholder="0"></div>
      </div>
      <div class="field-row">
        <div class="field" id="sm-loc-wrap" style="display:none;"><label for="sm-loc">Site destination</label><select id="sm-loc">${locOpts}</select></div>
        <div class="field"><label for="sm-ref">Référence (BL, motif…)</label><input type="text" id="sm-ref"></div>
      </div>
      <div id="sm-error"></div>
      <button class="btn" data-action="stock-move" data-id="${it.id}">Valider le mouvement</button>
      <div class="hint">Réception/Retour augmentent la quantité, Sortie la diminue, Ajustement fixe la valeur exacte, Transfert change le site.</div>
    </div>`;
  }
  return `<div class="detail-header"><div><span class="ticket-id">${esc(it.sku||"")}</span><h2>${esc(it.name)}</h2>
      <div class="meta" style="font-size:12.5px;color:var(--ink-soft);display:flex;gap:10px;flex-wrap:wrap;"><span class="badge svc">${esc(it.category?it.category.name:"—")}</span><span>${it.location?esc(it.location.name):""}</span><span>Seuil min : ${esc(it.min_threshold||0)}</span></div></div>
      <div style="display:flex;gap:8px;align-items:center;"><span class="badge ${low?'overdue':'closed'}">${esc(it.quantity)} ${esc(it.unit||"")}</span>${low?`<span class="badge overdue">Sous le seuil</span>`:""}</div></div>
    <div class="two-col">${editable?moveCard:`<div class="card"><div class="section-label">Stock</div><div style="font-size:13.5px;">Quantité actuelle : <strong>${esc(it.quantity)} ${esc(it.unit||"")}</strong></div></div>`}
      <div class="card"><div class="section-label">Mouvements</div>${moves?`<div class="thread">${moves}</div>`:`<div class="empty-state">Aucun mouvement.</div>`}</div>
    </div>`;
}
function onStockTypeChange(){ const t=document.getElementById("sm-type").value; const w=document.getElementById("sm-loc-wrap"); if(w) w.style.display = t==="transfer"?"block":"none"; }

// =========================== ACHATS (Phase 3 — demandes) ===========================
function prStatusBadge(s){
  const map={"open":"pending","ordered":"progress","partial":"testing","received":"closed","cancelled":"reopened"};
  const lbl={"open":"Ouverte","ordered":"Commandée","partial":"Partielle","received":"Reçue","cancelled":"Annulée"};
  return `<span class="badge ${map[s]||'pending'}">${esc(lbl[s]||s)}</span>`;
}
async function loadProcurement(){
  try{
    const [reqs, deps, ords, vends] = await Promise.all([
      sb.from("purchase_requests").select("*, requester:requester_id(full_name), department:department_id(name), location:location_id(name)").order("created_at",{ascending:false}),
      sb.from("departments").select("*").eq("is_active",true).order("name"),
      sb.from("purchase_orders").select("*, vendor:vendor_id(name), request:request_id(request_no, justification)").order("created_at",{ascending:false}),
      sb.from("vendors").select("*").order("name")
    ]);
    state.prs=reqs.data||[]; state.departments=deps.data||[]; state.pos=ords.data||[]; state.vendors=vends.data||[]; state.prLoaded=true;
    if(!state.locations.length){ const {data}=await sb.from("locations").select("*").eq("is_active",true).order("name"); state.locations=data||[]; }
    render();
  }catch(e){ state.prs=[]; state.prLoaded=true; render(); }
}
async function reloadPr(){
  const { data } = await sb.from("purchase_requests").select("*, requester:requester_id(full_name), department:department_id(name), location:location_id(name)").order("created_at",{ascending:false});
  state.prs=data||[];
}
async function reloadPos(){
  const { data } = await sb.from("purchase_orders").select("*, vendor:vendor_id(name), request:request_id(request_no, justification)").order("created_at",{ascending:false});
  state.pos=data||[];
}
async function loadPrItems(id){
  const { data } = await sb.from("purchase_request_items").select("*").eq("request_id",id).order("id");
  state.prItems=data||[];
  if(state.selectedPrId===id) render();
}

function renderProcurementArea(){
  if(!state.prLoaded){ loadProcurement(); return `<div class="empty-state">Chargement des achats…</div>`; }
  if(state.selectedPrId){ const r=state.prs.find(x=>x.id===state.selectedPrId); if(r) return `<button class="back-link" data-action="pr-back">&larr; Retour</button>`+renderPrDetail(r); state.selectedPrId=null; }
  if(state.selectedPoId){ const o=state.pos.find(x=>x.id===state.selectedPoId); if(o) return `<button class="back-link" data-action="po-back">&larr; Retour</button>`+renderPoDetail(o); state.selectedPoId=null; }
  if(state.prNew && canCreatePr()) return `<button class="back-link" data-action="pr-cancel">&larr; Retour à la liste</button>`+renderPrForm();
  const sub=`<div class="subnav">
    <button data-action="proc-subview" data-view="requests" class="${state.procSubview==='requests'?'active':''}">Demandes</button>
    <button data-action="proc-subview" data-view="orders" class="${state.procSubview==='orders'?'active':''}">Commandes (${state.pos.length})</button>
  </div>`;
  return sub + (state.procSubview==="orders" ? renderPoList() : renderPrList());
}
function renderPoList(){
  const rows=state.pos.map(o=>`<div class="ticket-row" data-action="open-po" data-id="${o.id}">
    <div class="col-main"><div class="subject">${esc(o.vendor?o.vendor.name:"(fournisseur ?)")} <span class="ticket-id">${esc(o.po_no||"")}</span></div>
      <div class="meta"><span>${esc(o.request?o.request.request_no:"")}</span><span>${fmtDate(o.created_at)}</span>${o.delivery_date?`<span>Livraison : ${esc(o.delivery_date)}</span>`:""}${o.amount!=null?`<span>${Number(o.amount).toLocaleString("fr-FR")}</span>`:""}</div></div>
    <div class="col-status">${prStatusBadge(o.status)}</div></div>`).join("");
  return state.pos.length?`<div class="ticket-list">${rows}</div>`:`<div class="empty-state">Aucune commande. Convertissez une demande depuis l'onglet Demandes.</div>`;
}
async function loadPoFull(o){
  if(!o){ return; }
  const [items, receipts] = await Promise.all([
    sb.from("purchase_request_items").select("*").eq("po_id", o.id).order("id"),
    sb.from("goods_receipts").select("*, items:goods_receipt_items(*)").eq("po_id", o.id).order("received_at",{ascending:false})
  ]);
  state.poItems = items.data||[];
  state.poReceipts = receipts.data||[];
  const recv={};
  (state.poReceipts||[]).forEach(r=> (r.items||[]).forEach(gi=>{ if(gi.request_item_id){ recv[gi.request_item_id]=(recv[gi.request_item_id]||0)+(Number(gi.qty)||0); } }));
  state.receivedByItem = recv;
  render();
}
function receivedQty(lineId){ return state.receivedByItem[lineId]||0; }
function remainingQty(line){ return Math.max(0, (Number(line.qty)||0) - receivedQty(line.id)); }
function poFullyReceived(){ return (state.poItems||[]).every(l=> remainingQty(l)<=0); }
function renderPoDetail(o){
  const items=(state.poItems||[]);
  const total=items.reduce((s,it)=>s+(Number(it.qty)||0)*(Number(it.unit_cost)||0),0);
  const fully=poFullyReceived();
  const itemRows=items.map(it=>{
    const rec=receivedQty(it.id), rem=remainingQty(it);
    const recColor = rem<=0 ? "#1e7e34" : (rec>0 ? "#b8860b" : "var(--ink-soft)");
    return `<tr><td>${esc(it.description)}</td><td style="text-align:right;font-family:var(--mono);">${esc(it.qty)}</td><td style="text-align:right;font-family:var(--mono);color:${recColor};">${rec}</td><td style="text-align:right;font-family:var(--mono);">${rem}</td></tr>`;
  }).join("");
  const recBtn = (!fully && canCreatePr() && !state.poReceiving) ? `<button class="btn" data-action="po-receive" data-id="${o.id}">Réceptionner</button>` : "";
  const histRows=(state.poReceipts||[]).map(r=>{
    const lines=(r.items||[]).map(gi=>{
      const dest = gi.destination==="asset"?"→ Parc":(gi.destination==="stock"?"→ Stock":"ignoré");
      return `<div style="font-size:12.5px;color:var(--ink-soft);">• ${esc(gi.description||"")} × ${esc(gi.qty)} <span style="color:var(--ink-faint);">${dest}</span></div>`;
    }).join("");

function convertCard(r){
  if(r.status==="cancelled") return "";

  const items=(state.prItems||[]);
  const free=items.filter(it=>!it.po_id);
  if(items.length && free.length===0) return `<div class="card" style="margin-top:16px;"><div class="section-label">Commandes</div><div style="font-size:13.5px;">Toutes les lignes de cette demande ont été commandées. Consultez l'onglet <strong>Commandes</strong>.</div></div>`;
  if(!free.length) return "";
  const noVendor=state.vendors.filter(v=>v.is_active!==false).length===0;
  if(noVendor) return `<div class="card" style="margin-top:16px;"><div class="section-label">Créer une commande</div><div class="hint" style="color:var(--critical);">Aucun fournisseur enregistré. Ajoutez-en dans Maintenance → Fournisseurs avant de commander.</div></div>`;
  const vendorOpts=`<option value="">— choisir un fournisseur —</option>`+state.vendors.filter(v=>v.is_active!==false).map(v=>`<option value="${v.id}">${esc(v.name)}</option>`).join("");
  const lineRows=free.map(it=>{
    const lt=(Number(it.qty)||0)*(Number(it.unit_cost)||0);
    return `<label class="cv-row" style="display:flex;align-items:center;gap:10px;padding:7px 4px;border-bottom:1px solid var(--border);cursor:pointer;">
      <input type="checkbox" class="cv-line" value="${it.id}" data-cost="${lt}" checked onchange="onCvToggle()">
      <span style="flex:1;">${esc(it.description)}</span>
      <span style="font-family:var(--mono);color:var(--ink-soft);">qté ${esc(it.qty)}</span>
      <span style="font-family:var(--mono);width:90px;text-align:right;">${lt.toLocaleString("fr-FR")}</span>
    </label>`;
  }).join("");
  const initialTotal=free.reduce((s,it)=>s+(Number(it.qty)||0)*(Number(it.unit_cost)||0),0);
  return `<div class="card" style="margin-top:16px;border-color:var(--brand-2);"><div class="section-label">Créer une commande</div>
    <div class="hint">Cochez les lignes à inclure dans cette commande. Les lignes non cochées restent disponibles pour une autre commande / un autre fournisseur.</div>
    <div style="margin:8px 0;">${lineRows}</div>
    <div class="field-row">
      <div class="field"><label for="cv-vendor">Fournisseur</label><select id="cv-vendor">${vendorOpts}</select></div>
      <div class="field"><label for="cv-deliv">Livraison prévue</label><input type="date" id="cv-deliv"></div>
    </div>
    <div class="field" style="max-width:260px;"><label for="cv-amount">Montant (auto, modifiable)</label><input type="text" id="cv-amount" value="${initialTotal||""}"></div>
    <div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:8px;">Total des lignes cochées : <strong id="cv-total">${initialTotal.toLocaleString("fr-FR")}</strong></div>
    <div id="cv-error"></div>
    <button class="btn" data-action="convert-pr" data-id="${r.id}">Créer la commande</button>
  </div>`;
}
function onCvToggle(){
  let t=0; document.querySelectorAll(".cv-line").forEach(c=>{ if(c.checked) t+=Number(c.dataset.cost)||0; });
  const tot=document.getElementById("cv-total"); if(tot) tot.textContent=t.toLocaleString("fr-FR");
  const amt=document.getElementById("cv-amount"); if(amt) amt.value=t||"";
}

function projectStatuses(){ return lkVals("project_status", ["Planned","In Progress","On Hold","Completed","Cancelled"]); }
const TASK_STATUSES=[["To Do","À faire"],["In Progress","En cours"],["Blocked","Bloquée"],["Done","Terminée"]];
function taskStatusLabel(v){ const x=TASK_STATUSES.find(t=>t[0]===v); return x?x[1]:v; }
function taskStatusBadge(s){ const map={"To Do":"pending","In Progress":"progress","Blocked":"reopened","Done":"closed"}; return `<span class="badge ${map[s]||'pending'}">${esc(taskStatusLabel(s))}</span>`; }
function projectStatusLabel(v){ const l=state.lookups.find(x=>x.type==="project_status"&&x.value===v); return l?l.label:v; }
function projectStatusBadge(s){
  const map={"Planned":"pending","In Progress":"progress","On Hold":"testing","Completed":"closed","Cancelled":"reopened"};
  return `<span class="badge ${map[s]||'pending'}">${esc(projectStatusLabel(s))}</span>`;
}
function progressBar(pct){
  const v=Math.max(0,Math.min(100,Number(pct)||0));
  return `<div style="background:var(--border);border-radius:6px;height:8px;overflow:hidden;min-width:120px;"><div style="height:100%;width:${v}%;background:var(--brand-2);"></div></div><span style="font-family:var(--mono);font-size:12px;">${v}%</span>`;
}
async function loadProjects(){
  try{
    const { data } = await sb.from("projects").select("*, manager:manager_id(full_name), location:location_id(name)").order("created_at",{ascending:false});
    state.projects=data||[]; state.projectsLoaded=true;
    if(!state.profilesList.length){ const {data:pl}=await sb.from("profiles").select("id, full_name, first_name, last_name, email").eq("is_active",true).order("full_name"); state.profilesList=pl||[]; }
    if(!state.locations.length){ const {data:lo}=await sb.from("locations").select("*").eq("is_active",true).order("name"); state.locations=lo||[]; }
    render();
  }catch(e){ state.projects=[]; state.projectsLoaded=true; render(); }
}
async function reloadProjects(){
  const { data } = await sb.from("projects").select("*, manager:manager_id(full_name), location:location_id(name)").order("created_at",{ascending:false});

}

function renderGantt(tasks){
  const toD = s => new Date(s+"T00:00:00").getTime();
  const dated = tasks.filter(t=>t.start_date && t.end_date && toD(t.end_date)>=toD(t.start_date));
  if(!dated.length) return `<div class="hint">Ajoutez des dates de début et de fin aux tâches pour afficher la frise.</div>`;
  const DAY=86400000, dayW=20, rowH=42, labelW=230, headH=26;
  let min=Math.min(...dated.map(t=>toD(t.start_date))), max=Math.max(...dated.map(t=>toD(t.end_date)));
  const totalDays=Math.round((max-min)/DAY)+1, chartW=Math.max(totalDays*dayW, 320), chartH=dated.length*rowH;
  const idx={}; dated.forEach((t,i)=>idx[t.id]=i);
  const xOf=d=>Math.round((toD(d)-min)/DAY)*dayW;
  const wOf=(s,e)=>(Math.round((toD(e)-toD(s))/DAY)+1)*dayW;
  // bandes de lignes alternées + repères hebdo + ligne "aujourd'hui"
  let bands="", grid="", labels="";
  dated.forEach((t,i)=>{ if(i%2===1) bands+=`<div style="position:absolute;left:0;top:${headH+i*rowH}px;width:${chartW}px;height:${rowH}px;background:rgba(46,117,182,.04);"></div>`; });
  for(let d=0; d<totalDays; d+=7){ const dt=new Date(min+d*DAY);
    grid+=`<div style="position:absolute;left:${d*dayW}px;top:0;height:${headH+chartH}px;border-left:1px solid #edf1f6;"></div>`;
    labels+=`<div style="position:absolute;left:${d*dayW+4}px;top:6px;font-size:10px;color:var(--ink-soft);white-space:nowrap;">${dt.getDate()}/${dt.getMonth()+1}</div>`;
  }
  const today=new Date(); today.setHours(0,0,0,0);
  let todayLine=""; if(today.getTime()>=min && today.getTime()<=max){ const tx=Math.round((today.getTime()-min)/DAY)*dayW; todayLine=`<div style="position:absolute;left:${tx}px;top:0;height:${headH+chartH}px;border-left:2px solid #e07a5f;opacity:.6;"></div><div style="position:absolute;left:${tx+3}px;top:6px;font-size:10px;color:#e07a5f;">auj.</div>`; }
  const bars=dated.map((t,i)=>{
    const x=xOf(t.start_date), w=Math.max(dayW,wOf(t.start_date,t.end_date)), y=i*rowH+10;
    const pct=Math.max(0,Math.min(100,Number(t.progress_pct)||0));
    const col=t.status==="Done"?"#2e9e5b":(t.status==="Blocked"?"#d9534f":"#3a7bd5");
    const labelInside = w>42 ? `<span style="position:absolute;right:6px;top:1px;font-size:10.5px;color:#fff;mix-blend-mode:difference;">${pct}%</span>` : "";
    return `<div title="${esc(t.name)} — ${pct}%" style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:22px;background:#e6edf5;border:1px solid #d4deea;border-radius:6px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.06);"><div style="height:100%;width:${pct}%;background:${col};border-radius:5px 0 0 5px;"></div>${labelInside}</div>`;
  }).join("");
  let arrows="";
  dated.forEach((t,i)=>{
    if(t.depends_on_task_id && idx[t.depends_on_task_id]!==undefined){
      const di=idx[t.depends_on_task_id], dep=dated[di];
      const x1=xOf(dep.start_date)+Math.max(dayW,wOf(dep.start_date,dep.end_date)), y1=di*rowH+21;
      const x2=xOf(t.start_date), y2=i*rowH+21;
      arrows+=`<path d="M${x1},${y1} C${x1+16},${y1} ${x2-16},${y2} ${x2},${y2}" fill="none" stroke="#9aa7b8" stroke-width="1.5" marker-end="url(#ga)"/>`;
    }
  });
  const names=dated.map((t,i)=>`<div style="height:${rowH}px;display:flex;align-items:center;padding:0 10px;border-bottom:1px solid #eef2f6;${i%2===1?'background:rgba(46,117,182,.04);':''}"><span title="${esc(t.name)}" style="font-size:12.5px;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${esc(t.name)}</span></div>`).join("");
  return `<div style="display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;">
    <div style="width:${labelW}px;flex:0 0 ${labelW}px;border-right:1px solid var(--border);">
      <div style="height:${headH}px;border-bottom:1px solid var(--border);background:#f4f7fb;display:flex;align-items:center;padding:0 10px;font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.4px;">Tâche</div>${names}
    </div>
    <div style="overflow-x:auto;flex:1;">
      <div style="position:relative;width:${chartW}px;height:${headH+chartH}px;background:#fff;">
        ${bands}${grid}${todayLine}${labels}
        <div style="position:absolute;left:0;top:${headH}px;width:${chartW}px;height:${chartH}px;">
          <svg width="${chartW}" height="${chartH}" style="position:absolute;left:0;top:0;pointer-events:none;"><defs><marker id="ga" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#9aa7b8"/></marker></defs>${arrows}</svg>
          ${bars}
        </div>
      </div>
    </div>
  </div>`;
}

function medlogixTickets(){ return state.tickets.filter(t=>t.service==="MEDLOGIX"); }
function monActiveMedlogix(){
  return medlogixTickets().filter(t=>["In Progress","Testing","Pending","Reopened"].includes(t.status))
    .sort((a,b)=>statusRank(a.status)-statusRank(b.status)||priorityRank(a.priority)-priorityRank(b.priority)||new Date(a.created_at)-new Date(b.created_at));
}
function monBars(items){
  if(!items.length) return `<div style="color:#7e93b3;font-size:13px;">Aucune donnée.</div>`;
  const max=Math.max(1,...items.map(i=>i.count));
  return items.map(i=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:9px;"><div style="width:130px;font-size:12px;color:#9fb3d1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(i.label)}">${esc(i.label)}</div><div style="flex:1;height:7px;background:#1c2a42;border-radius:5px;overflow:hidden;"><div style="height:100%;width:${Math.round(i.count/max*100)}%;background:#3aa0ff;border-radius:5px;"></div></div><div style="font-family:var(--mono);font-size:12px;width:24px;text-align:right;color:#cfe0f5;">${i.count}</div></div>`).join("");
}
function renderMonitor(){

  }).join("");
  const mainPanel=`<div class="mon-panel"><h3>Tâches MEDLOGIX à traiter (${active.length}) — les plus anciennes en tête</h3>${active.length?`<table class="mon-table"><thead><tr><th>N°</th><th>Sujet</th><th>Module</th><th>Priorité</th><th>Statut</th><th>Affecté à</th><th>Âge</th></tr></thead><tbody>${rows}</tbody></table>`:`<div style="color:#7e93b3;padding:24px 0;text-align:center;">Aucune tâche MEDLOGIX en cours. 🎉</div>`}</div>`;

function exportMedlogixCSV(){
  const cols=["N°","Service","Module","Ecran","Priorite","Sujet","Demandeur","Statut","Affecte","Cree","Jours"];
  const rows=state.tickets.filter(t=>t.service==="MEDLOGIX").map(t=>[t.ticket_no||"",t.service,t.module||"",t.screen||"",t.priority,t.subject,reqName(t),t.status,t.assignee?t.assignee.full_name||"":"",new Date(t.created_at).toLocaleString("fr-FR"),String(daysSince(t.created_at))]);
  const csv=[cols,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"}); const url=URL.createObjectURL(blob);

}

// =========================== EVENTS ===========================
function bindEvents(){
  document.querySelectorAll("[data-action]").forEach(el=>{ el.addEventListener(["change-role","change-group"].includes(el.dataset.action)?"change":"click", onAction); });
  const wire=(id,fn)=>{const e=document.getElementById(id); if(e) e.addEventListener("change",fn);};
  wire("f-status",e=>{state.filter.status=e.target.value; render();});
  wire("f-service",e=>{state.filter.service=e.target.value; render();});
  wire("f-priority",e=>{state.filter.priority=e.target.value; render();});
  wire("dash-period",e=>{state.dashPeriod=e.target.value; render();});
  wire("af-cat",e=>{state.assetFilter.cat=e.target.value; render();});
  wire("af-status",e=>{state.assetFilter.status=e.target.value; render();});
  const af=document.getElementById("af-search");
  if(af){ af.addEventListener("input",e=>{state.assetFilter.search=e.target.value; render();}); af.focus(); af.setSelectionRange(af.value.length,af.value.length); }
  const sts=document.getElementById("st-search");
  if(sts){ sts.addEventListener("input",e=>{state.stockSearch=e.target.value; render();}); sts.focus(); sts.setSelectionRange(sts.value.length,sts.value.length); }
  wire("pj-status",e=>{state.projectFilter.status=e.target.value; render();});
  const rsrc=document.getElementById("report-src");
  if(rsrc) rsrc.addEventListener("change",e=>{ state.reportSource=e.target.value; state.reportFilters={}; state.reportRows=null; state.reportError=null; render(); });
  document.querySelectorAll("[data-rf]").forEach(el=>{
    const key=el.getAttribute("data-rf");
    const ev = el.tagName==="SELECT" ? "change" : "input";
    el.addEventListener(ev, e=>{ state.reportFilters[key]=el.value; });
  });
  const pjs=document.getElementById("pj-search");
  if(pjs){ pjs.addEventListener("input",e=>{state.projectFilter.search=e.target.value; render();}); pjs.focus(); pjs.setSelectionRange(pjs.value.length,pjs.value.length); }
  wire("cf",e=>{state.customFrom=e.target.value; render();});
  wire("ct",e=>{state.customTo=e.target.value; render();});
  const fs=document.getElementById("f-search");
  if(fs){ fs.addEventListener("input",e=>{state.filter.search=e.target.value; render();}); fs.focus(); fs.setSelectionRange(fs.value.length,fs.value.length); }
}

async function onAction(e){
  const el=e.currentTarget, action=el.dataset.action;

  const unbusy=()=>{ el.disabled=false; if(el.dataset._t) el.textContent=el.dataset._t; };

      try{ const created=res.filter(r=>r.status==='créé').map(r=>r.email); if(created.length) await sb.from("profiles").update({ must_change_password:true }).in("email", created); }catch(_){}
      out.innerHTML=`<div class="section-label">Résultat : ${ok}/${res.length} créé(s)</div>
        <div style="overflow-x:auto;border:1px solid var(--border);border-radius:8px;"><table style="border-collapse:collapse;width:100%;"><tr>${th("Email")}${th("Statut")}${th("Mot de passe initial")}${th("Détail")}</tr>${rowsHtml}</table></div>
        <div class="hint" style="font-size:12px;margin-top:6px;">⚠️ Copiez ces mots de passe maintenant : ils ne seront plus affichés. Transmettez-les aux personnes concernées.</div>`;
      ta.value="";
      await loadUsers();
    }catch(err){ box.innerHTML=`<div class="error-msg">Import impossible : ${esc(err.message||String(err))}.<br>Vérifiez que la fonction « admin-bulk-users » est déployée.</div>`; unbusy(); }
    return;
  }
}
async function loadActivity(id){
  const { data } = await sb.from("ticket_activity").select("*, actor:actor_id(full_name, role:roles(name))").eq("ticket_id",id).order("created_at");
  state.ticketActivity=data||[];
  if(state.selectedTicketId===id) render();
}

// --- Go ---
// ---- PWA : installation sur le bureau (barre des tâches) ----
let deferredInstallPrompt = null;
if ("serviceWorker" in navigator) {
  window.addEventListener("load", ()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}
function _isStandalone(){ return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true; }
window.addEventListener("beforeinstallprompt", (e)=>{ e.preventDefault(); deferredInstallPrompt = e; if(!_isStandalone()){ state.canInstall = true; render(); } });
window.addEventListener("appinstalled", ()=>{ deferredInstallPrompt = null; state.canInstall = false; render(); });

init();
</script>

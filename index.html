<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDLOG IT Ops — Support Desk</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#EEF1F4; --surface:#FFF; --surface-2:#F6F8FA; --ink:#0F1B2D; --ink-soft:#54657A; --ink-faint:#8A99AC;
    --border:#DCE2E8; --brand:#0B3D62; --brand-2:#0E7C86; --brand-soft:#E7EEF3; --gold:#B8893F;
    --pending:#B45309; --pending-bg:#FDF1E1; --progress:#1D4ED8; --progress-bg:#E6EDFC;
    --testing:#6D28D9; --testing-bg:#EFE7FB; --closed:#15803D; --closed-bg:#E5F4EA;
    --reopened:#BE185D; --reopened-bg:#FCE4ED; --critical:#B91C1C;
    --radius:10px; --mono:ui-monospace,Menlo,Consolas,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body{background:var(--bg); color:var(--ink); font-family:var(--sans); -webkit-font-smoothing:antialiased;}
  button,input,select,textarea{font-family:inherit;}
  :focus-visible{outline:2px solid var(--brand-2); outline-offset:2px;}
  #app{min-height:100vh; display:flex; flex-direction:column;}
  header.topbar{background:var(--brand); color:#fff; padding:12px 24px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; border-bottom:3px solid var(--gold);}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .mark{width:34px; height:34px; border-radius:7px; background:var(--brand-2); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px;}
  .brand .name{font-weight:700; font-size:16px;}
  .brand .sub{font-size:11px; color:#C9D8E3; letter-spacing:1.1px; text-transform:uppercase; margin-top:1px;}
  .topnav{display:flex; gap:6px; background:rgba(255,255,255,0.08); padding:4px; border-radius:8px; flex-wrap:wrap;}
  .topnav button{border:none; background:transparent; color:#D9E4EC; padding:8px 15px; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer;}
  .topnav button.active{background:#fff; color:var(--brand);}
  .session-info{font-size:12px; color:#C9D8E3; display:flex; align-items:center; gap:10px;}
  .session-info .role-chip{background:rgba(255,255,255,0.16); padding:2px 8px; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.4px;}
  .session-info button.link{background:none; border:none; color:#fff; text-decoration:underline; cursor:pointer; font-size:12px; padding:0;}
  main{flex:1; padding:24px; max-width:1180px; margin:0 auto; width:100%;}
  .card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px;}
  h1.page-title{font-size:20px; margin:0 0 4px; color:var(--brand);}
  p.page-sub{font-size:13px; color:var(--ink-soft); margin:0 0 22px;}
  .section-label{font-size:12px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.6px; margin:0 0 10px;}
  .stat-row{display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin-bottom:18px;}
  @media (max-width:980px){.stat-row{grid-template-columns:repeat(3,1fr);}}
  @media (max-width:560px){.stat-row{grid-template-columns:repeat(2,1fr);}}
  .stat{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:13px 15px;}
  .stat .n{font-family:var(--mono); font-size:22px; font-weight:700; color:var(--brand);}
  .stat .l{font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.5px; margin-top:2px;}
  .stat.alert .n{color:var(--critical);} .stat.accent .n{color:var(--brand-2);}
  .two-col{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:18px;}
  @media (max-width:820px){.two-col{grid-template-columns:1fr;}}
  label{display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:5px;}
  input[type=text],input[type=password],input[type=email],input[type=date],select,textarea{width:100%; padding:10px 11px; border:1px solid var(--border); border-radius:7px; font-size:13.5px; color:var(--ink); background:#fff;}
  textarea{resize:vertical; min-height:84px;}
  .field{margin-bottom:16px;} .field-row{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media (max-width:640px){.field-row{grid-template-columns:1fr;}}
  .btn{display:inline-flex; align-items:center; gap:6px; background:var(--brand); color:#fff; border:none; padding:10px 18px; border-radius:7px; font-size:13.5px; font-weight:600; cursor:pointer;}
  .btn:hover{background:#0a3251;}
  .btn.secondary{background:#fff; color:var(--brand); border:1px solid var(--border);}
  .btn.danger{background:#fff; color:var(--critical); border:1px solid #F3C9C9;}
  .btn.tiny{padding:6px 11px; font-size:12px;}
  .btn:disabled{opacity:.5; cursor:not-allowed;}
  .btn-row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  .subnav{display:flex; gap:18px; margin-bottom:18px; border-bottom:1px solid var(--border);}
  .subnav button{background:none; border:none; padding:10px 2px; font-size:13.5px; font-weight:600; color:var(--ink-soft); cursor:pointer; border-bottom:2px solid transparent; position:relative; top:1px;}
  .subnav button.active{color:var(--brand); border-bottom-color:var(--brand-2);}
  .badge{display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700; padding:4px 9px; border-radius:20px; white-space:nowrap;}
  .badge.pending{background:var(--pending-bg); color:var(--pending);}
  .badge.progress{background:var(--progress-bg); color:var(--progress);}
  .badge.testing{background:var(--testing-bg); color:var(--testing);}
  .badge.closed{background:var(--closed-bg); color:var(--closed);}
  .badge.reopened{background:var(--reopened-bg); color:var(--reopened);}
  .badge.priority-Critical{background:#FBE1E1; color:var(--critical);}
  .badge.priority-High{background:#FCEBD8; color:#9A4D0B;}
  .badge.priority-Medium{background:#EFF1F4; color:var(--ink-soft);}
  .badge.priority-Low{background:#EFF1F4; color:var(--ink-faint);}
  .badge.overdue{background:#FBE1E1; color:var(--critical);}
  .badge.svc{background:var(--brand-soft); color:var(--brand);}
  .ticket-id{font-family:var(--mono); font-size:12px; color:var(--ink-soft);}
  .filters{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; align-items:flex-end;}
  .filters .field{margin-bottom:0; min-width:150px;} .filters .search{flex:1; min-width:200px;}
  .ticket-list{display:flex; flex-direction:column; gap:10px;}
  .ticket-row{background:var(--surface); border:1px solid var(--border); border-radius:9px; padding:14px 16px; cursor:pointer; display:flex; align-items:center; gap:14px; border-left:4px solid var(--ink-faint);}
  .ticket-row:hover{border-color:var(--brand-2);}
  .ticket-row.status-Pending{border-left-color:var(--pending);}
  .ticket-row.status-In-Progress{border-left-color:var(--progress);}
  .ticket-row.status-Testing{border-left-color:var(--testing);}
  .ticket-row.status-Closed{border-left-color:var(--closed);}
  .ticket-row.status-Reopened{border-left-color:var(--reopened);}
  .ticket-row .col-main{flex:1; min-width:0;}
  .ticket-row .subject{font-weight:600; font-size:14px; margin-bottom:3px;}
  .ticket-row .meta{font-size:12px; color:var(--ink-soft); display:flex; gap:10px; flex-wrap:wrap;}
  .ticket-row .col-status{display:flex; flex-direction:column; align-items:flex-end; gap:6px;}
  .empty-state{text-align:center; padding:46px 20px; color:var(--ink-soft); font-size:13.5px; border:1px dashed var(--border); border-radius:var(--radius); background:var(--surface-2);}
  .bars{display:flex; flex-direction:column; gap:9px;}
  .bar-row{display:flex; align-items:center; gap:10px;}
  .bar-row .b-label{font-size:12.5px; color:var(--ink-soft); width:230px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .bar-row .b-track{flex:1; height:8px; background:var(--surface-2); border-radius:6px; overflow:hidden;}
  .bar-row .b-fill{height:100%; background:var(--brand-2); border-radius:6px;}
  .bar-row .b-count{font-family:var(--mono); font-size:12px; width:26px; text-align:right;}
  .detail-header{display:flex; justify-content:space-between; align-items:flex-start; gap:14px; margin-bottom:14px; flex-wrap:wrap;}
  .detail-header h2{font-size:17px; margin:2px 0 6px;}
  .back-link{background:none; border:none; color:var(--brand-2); font-size:13px; font-weight:600; cursor:pointer; padding:0; margin-bottom:14px;}
  .stepper{display:flex; align-items:center; margin:16px 0 22px;}
  .step{display:flex; flex-direction:column; align-items:center; flex:1; position:relative;}
  .step .dot{width:15px; height:15px; border-radius:50%; background:var(--border); border:2px solid var(--border); z-index:2;}
  .step .lbl{font-size:11px; color:var(--ink-faint); margin-top:7px; font-weight:600; text-transform:uppercase;}
  .step .line{position:absolute; top:6px; left:50%; right:-50%; height:2px; background:var(--border); z-index:1;}
  .step:last-child .line{display:none;}
  .step.done .dot,.step.done .line{background:var(--brand-2); border-color:var(--brand-2);}
  .step.done .lbl{color:var(--brand-2);}
  .step.current .dot{background:var(--brand); border-color:var(--brand); box-shadow:0 0 0 4px var(--brand-soft);}
  .step.current .lbl{color:var(--brand);}
  .desc-box{background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:14px 16px; font-size:13.5px; line-height:1.55; margin-bottom:22px; white-space:pre-wrap;}
  .thread{display:flex; flex-direction:column; gap:12px; margin-bottom:22px;}
  .thread-item{border:1px solid var(--border); border-radius:8px; padding:12px 14px; background:#fff;}
  .thread-item.staff{background:var(--brand-soft); border-color:#CFE0EA;}
  .thread-item .t-head{display:flex; justify-content:space-between; font-size:12px; color:var(--ink-soft); margin-bottom:6px; gap:8px; flex-wrap:wrap;}
  .thread-item .t-head .who{font-weight:700; color:var(--ink);}
  .thread-item .t-body{font-size:13.5px; line-height:1.5; white-space:pre-wrap;}
  .resolve-box{border:1px solid var(--border); border-radius:9px; padding:16px; background:var(--surface-2);}
  .reopen-banner{background:var(--reopened-bg); color:var(--reopened); border:1px solid #F3C2D8; border-radius:8px; padding:10px 14px; font-size:12.5px; font-weight:600; margin-bottom:16px;}
  .gate{max-width:420px; margin:54px auto; text-align:center;}
  .gate h1{font-size:19px; color:var(--brand); margin-bottom:6px;}
  .gate p{font-size:13px; color:var(--ink-soft); margin-bottom:22px;}
  .gate .card{text-align:left;}
  .error-msg{background:#FBE1E1; color:var(--critical); border-radius:7px; padding:9px 12px; font-size:12.5px; margin-top:10px;}
  .ok-msg{background:var(--closed-bg); color:var(--closed); border-radius:7px; padding:9px 12px; font-size:12.5px; margin-top:10px;}
  .hint{font-size:11.5px; color:var(--ink-faint); margin-top:8px;}
  footer.app-footer{text-align:center; font-size:11.5px; color:var(--ink-faint); padding:18px; border-top:1px solid var(--border);}
  .announce-banner{display:flex; align-items:stretch; background:var(--brand); color:#fff; border-radius:var(--radius); overflow:hidden; margin-bottom:18px; border:1px solid #0a3251;}
  .announce-banner .ab-tag{display:flex; align-items:center; gap:7px; background:var(--gold); color:#3a2a0e; font-weight:800; font-size:12px; letter-spacing:.5px; text-transform:uppercase; padding:0 16px; white-space:nowrap;}
  .announce-banner .ab-viewport{flex:1; overflow:hidden; position:relative;}
  .announce-banner .ab-track{display:inline-flex; gap:48px; white-space:nowrap; padding:13px 0; animation:ab-scroll 60s linear infinite;}
  .announce-banner .ab-viewport:hover .ab-track{animation-play-state:paused;}
  .announce-banner .ab-item{font-size:13.5px;}
  .announce-banner .ab-item .ab-meta{color:#bcd3e2; font-size:11.5px; margin-left:8px;}
  @keyframes ab-scroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
  @media (prefers-reduced-motion:reduce){.announce-banner .ab-track{animation:none; white-space:normal;}}
  /* ===== Monitoring (mur d'écran) ===== */
  .monitor-wrap{width:100%;}
  .mon{background:#0b1322; color:#e7eef8; min-height:calc(100vh - 58px); padding:18px 22px;}
  .mon-kpis{display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin-bottom:16px;}
  @media (max-width:980px){.mon-kpis{grid-template-columns:repeat(3,1fr);}}
  .mon-kpi{background:#131f33; border:1px solid #20304a; border-radius:12px; padding:16px 18px;}
  .mon-kpi .n{font-family:var(--mono); font-size:36px; font-weight:800; line-height:1; color:#fff;}
  .mon-kpi .l{font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:#90a4c2; margin-top:7px;}
  .mon-kpi.amber .n{color:#ffb454;} .mon-kpi.blue .n{color:#5ca8ff;} .mon-kpi.violet .n{color:#b794f6;} .mon-kpi.pink .n{color:#f06fa6;} .mon-kpi.red .n{color:#ff6b6b;}
  .mon-grid{display:grid; grid-template-columns:2fr 1fr; gap:16px;}
  @media (max-width:980px){.mon-grid{grid-template-columns:1fr;}}
  .mon-panel{background:#101b2e; border:1px solid #20304a; border-radius:12px; padding:14px 16px; margin-bottom:16px;}
  .mon-panel h3{font-size:12px; text-transform:uppercase; letter-spacing:.7px; color:#9fb3d1; margin:0 0 12px;}
  table.mon-table{width:100%; border-collapse:collapse;}
  table.mon-table th{font-size:10.5px; text-transform:uppercase; letter-spacing:.5px; color:#7e93b3; text-align:left; padding:6px 8px; border-bottom:1px solid #21304a;}
  table.mon-table td{padding:10px 8px; border-bottom:1px solid #182539; font-size:14px; color:#d7e2f0; vertical-align:middle;}
  .mon-id{font-family:var(--mono); font-size:12px; color:#8fb4e6;}
  .mon-subj{font-weight:600;}
  .mon-age{font-family:var(--mono); font-size:13px;}
  .mon-age.over{color:#ff6b6b; font-weight:700;}
  .mon-foot{display:flex; justify-content:space-between; color:#7e93b3; font-size:12px; margin-top:6px; flex-wrap:wrap; gap:8px;}
  .mon-other{display:flex; gap:8px; flex-wrap:wrap;}
  .mon-other .chip{background:#16233a; border:1px solid #223150; border-radius:20px; padding:5px 11px; font-size:12px; color:#b9cae3;}
  @media print{ header.topbar, .no-print{display:none!important;} body{background:#fff;} main{max-width:none; padding:0;} .card{break-inside:avoid;} }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* =========================================================================
   MEDLOG IT Ops — Frontend Phase 1 (Supabase)
   Auth: Supabase Auth · Données: PostgreSQL via supabase-js · Sécurité: RLS
   ========================================================================= */

// --- Connexion Supabase (clé anon/publishable = publique, protégée par la RLS) ---
const SB_URL = "https://awdaxjpijvegkjrgcjqk.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3ZGF4anBpanZlZ2tqcmdjanFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5OTAwMzUsImV4cCI6MjA5NzU2NjAzNX0.wHDI1JTaWs4MJmIhBy4ePu6P-rfPBta-5jiP34LfSko";
const sb = supabase.createClient(SB_URL, SB_KEY);

// --- Référentiels de repli (le dictionnaire en base prime) ---
const SERVICES_FALLBACK = ["MEDLOGIX","Access Rights and Passwords","Business Telephony","Internet (Wi-Fi, Network, Performance, etc.)","IT Equipment & Devices Procurement","MSC Global Citrix Platform and Global Applications (TMS, SAP, Cognos, etc.)","Office 365 (Outlook, Excel, Teams, SharePoint, etc.)","Printing and Scanning","Workstation (PC, Monitor, Accessories, Software, etc.)"];
const PRIORITIES_FALLBACK = ["Critical","High","Medium","Low"];
const MODULE_TREE = {
  "Freight Management": ["Quotation","Job","Trip Tracking","Payment Request","Supplier Invoice","Customer Invoice / Credit Note","General Service Charge","Charge Item","Charge Template","Event","Freight Job Query","Freight Quotation Query","Customer Invoice Query","Query – Sale & Cost Sheet","Contact","Debtors Credit Limit","Supplier"],
  "Arrivela": ["Job Planning","Vehicle Servicing Costs","Resource Unavailability","Trip Report","Vehicle Servicing Costs Report","Trip Tracking Report"],
  "Dashboard": ["Quotations Dashboard","Job Dashboard","Event Dashboard","Vehicle Dashboard","User Management","Revenue by Clients Report","HAD Report"]
};
const STATUSES = ["Pending","In Progress","Testing","Closed","Reopened"];
const SLA_DAYS = 2;
const ROLE_LABEL = { admin:"Admin", it_manager:"IT Manager", technician:"Technicien", asset_manager:"Gest. parc", store_keeper:"Magasinier", buyer:"Acheteur", project_manager:"Chef projet", approver:"Approbateur", user:"Utilisateur", viewer:"Lecture seule" };

// --- État ---
let state = {
  booting:true, session:null, profile:null, loadError:"",
  view:"dashboard", loginError:"",
  tickets:[], lookups:[], announcements:[], roles:[],
  selectedTicketId:null, ticketActivity:[], reopening:false,
  newService:"", filter:{status:"all", service:"all", priority:"all", search:""},
  dashPeriod:"this_month", customFrom:"", customTo:"",
  maintSubview:"annonces", lookupType:"service",
  adminUsers:[], usersLoaded:false,
  assets:[], assetCats:[], assetsLoaded:false, assetFilter:{cat:"all", status:"all", search:""},
  selectedAssetId:null, assetNew:false, assetMovements:[], profilesList:[]
};

// --- Utilitaires ---
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmtDate(v){ const d=new Date(v); return isNaN(d)?"—":(d.toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"})+" · "+d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})); }
function daysSince(v){ return Math.floor((Date.now()-new Date(v).getTime())/86400000); }
function isOverdue(t){ return t.status!=="Closed" && daysSince(t.created_at) >= SLA_DAYS; }
function statusClass(s){ return {"Pending":"pending","In Progress":"progress","Testing":"testing","Closed":"closed","Reopened":"reopened"}[s]||"pending"; }
function statusRowClass(s){ return "status-"+String(s).replace(/\s+/g,"-"); }
function priorityRank(p){ return {"Critical":0,"High":1,"Medium":2,"Low":3}[p] ?? 4; }
function statusRank(s){ return {"Reopened":0,"Pending":1,"In Progress":2,"Testing":3,"Closed":4}[s] ?? 5; }
function roleName(){ return state.profile && state.profile.role ? state.profile.role.name : (state.profile?state.profile.role_name:null); }
function isAdmin(){ return roleName()==="admin"; }
function isStaff(){ return ["admin","it_manager","technician"].includes(roleName()); }
function canViewAssets(){ return ["admin","it_manager","technician","asset_manager"].includes(roleName()); }
function canEditAssets(){ return ["admin","asset_manager"].includes(roleName()); }
function canCreate(){ return roleName() && roleName()!=="viewer"; }
function uid(){ return state.session ? state.session.user.id : null; }
function myName(){ return state.profile ? (state.profile.full_name||state.profile.email) : ""; }
function getTicket(id){ return state.tickets.find(t=>t.id===id); }
function lkVals(type, fb){ const r=state.lookups.filter(l=>l.type===type); return r.length ? r.sort((a,b)=>(a.sort_order||0)-(b.sort_order||0)).map(l=>l.value) : fb.slice(); }
function getServices(){ return lkVals("service", SERVICES_FALLBACK); }
function getPriorities(){ return lkVals("priority", PRIORITIES_FALLBACK); }

function periodRange(){
  const now=new Date(); const out={from:0,to:Date.now()+1};
  const sod=d=>{const x=new Date(d);x.setHours(0,0,0,0);return x.getTime();};
  const eod=d=>{const x=new Date(d);x.setHours(23,59,59,999);return x.getTime();};
  switch(state.dashPeriod){
    case "today": out.from=sod(now); out.to=eod(now); break;
    case "yesterday": { const y=new Date(now); y.setDate(y.getDate()-1); out.from=sod(y); out.to=eod(y); break; }
    case "last7": { const s=new Date(now); s.setDate(s.getDate()-6); out.from=sod(s); out.to=eod(now); break; }
    case "this_month": out.from=new Date(now.getFullYear(),now.getMonth(),1).getTime(); out.to=eod(now); break;
    case "prev_month": out.from=new Date(now.getFullYear(),now.getMonth()-1,1).getTime(); out.to=new Date(now.getFullYear(),now.getMonth(),0,23,59,59,999).getTime(); break;
    case "this_year": out.from=new Date(now.getFullYear(),0,1).getTime(); out.to=eod(now); break;
    case "custom": out.from=state.customFrom?sod(new Date(state.customFrom)):0; out.to=state.customTo?eod(new Date(state.customTo)):Date.now()+1; break;
  }
  return out;
}
function inPeriod(t){ const r=periodRange(); const ms=new Date(t.created_at).getTime(); return ms>=r.from && ms<=r.to; }

function render(){ document.getElementById("app").innerHTML = renderApp(); bindEvents(); ensureMonitorTimers(); applyBannerSpeed(); }

// Vitesse de défilement constante et lente, quelle que soit la longueur de l'annonce.
function applyBannerSpeed(){
  const SPEED = 42; // pixels/seconde — lent et lisible
  document.querySelectorAll(".ab-track").forEach(tr=>{
    const half = tr.scrollWidth/2;            // une séquence (le contenu est doublé)
    if(half>0){ tr.style.animationDuration = Math.max(22, half/SPEED).toFixed(1)+"s"; }
  });
}
window.addEventListener("resize", ()=>{ applyBannerSpeed(); });

function isMonitor(){ return roleName()==="viewer"; }
let monDataTimer=null, monClockTimer=null;
function ensureMonitorTimers(){
  const on = isMonitor() && !state.booting;
  if(on && !monDataTimer){
    monDataTimer = setInterval(async ()=>{
      if(!isMonitor()){ clearInterval(monDataTimer); monDataTimer=null; return; }
      try{
        await reloadTickets(); state.lastSync=Date.now();
        const dyn=document.getElementById("mon-dynamic");
        if(state.view==="monitor" && dyn){ dyn.innerHTML=monDynamicHtml(); } // bandeau préservé : pas de saut du défilement
        else { render(); }
      }catch(e){}
    }, 10000);
  }
  if(on && !monClockTimer){
    monClockTimer = setInterval(()=>{ const c=document.getElementById("mon-clock"); if(c) c.textContent=new Date().toLocaleTimeString("fr-FR"); }, 1000);
  }
  if(!on){ if(monDataTimer){clearInterval(monDataTimer);monDataTimer=null;} if(monClockTimer){clearInterval(monClockTimer);monClockTimer=null;} }
}

// --- Boot / Auth ---
async function init(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ state.session=session; await afterLogin(); }
  else { state.booting=false; render(); }
  sb.auth.onAuthStateChange((event, sess)=>{
    if(event==="SIGNED_OUT"){ state.session=null; state.profile=null; render(); }
  });
}
async function afterLogin(){
  try{
    await loadProfile();
    await loadData();
    state.loadError="";
  }catch(e){ state.loadError = e.message||String(e); }
  state.booting=false;
  state.view = isMonitor() ? "monitor" : "dashboard";
  render();
}
async function loadProfile(){
  const { data, error } = await sb.from("profiles").select("*, role:roles(name)").eq("id", state.session.user.id).single();
  if(error) throw error;
  state.profile = data;
}
async function loadData(){
  const [tk, lk, an] = await Promise.all([ fetchTickets(), fetchLookups(), fetchAnnouncements() ]);
  state.tickets=tk; state.lookups=lk; state.announcements=an;
  if(!state.newService) state.newService = getServices()[0];
}
async function fetchTickets(){
  const { data, error } = await sb.from("tickets")
    .select("*, requester:requester_id(full_name,email), assignee:assignee_id(full_name)")
    .order("created_at",{ascending:false});
  if(error) throw error; return data||[];
}
async function fetchLookups(){
  const { data } = await sb.from("lookups").select("*").eq("is_active",true).order("sort_order");
  return data||[];
}
async function fetchAnnouncements(){
  const { data } = await sb.from("announcements").select("*, author:author_id(full_name)").eq("is_active",true).order("publish_date",{ascending:false});
  return data||[];
}
async function reloadTickets(){ state.tickets = await fetchTickets(); }

}

  }

function renderMain(){
  if(state.booting) return `<div class="gate"><h1>Chargement…</h1><p>Connexion à la base sécurisée.</p></div>`;
  if(!state.session || !state.profile) return renderLogin();
  if(state.loadError) return `<div class="gate"><h1>Erreur de chargement</h1><div class="card"><div class="error-msg">${esc(state.loadError)}</div><button class="btn" data-action="retry" style="margin-top:12px;">Réessayer</button></div></div>`;
  if(isMonitor()) return state.view==="report" ? renderReport() : state.view==="announces" ? renderMonitorAnnonces() : renderMonitor();
  if(state.view==="dashboard") return renderDashboard();
  if(state.view==="tickets") return renderTicketsArea();
  if(state.view==="assets") return canViewAssets()?renderAssetsArea():renderDashboard();
  if(state.view==="users") return isAdmin()?renderUsers():renderDashboard();
  if(state.view==="maintenance") return isAdmin()?renderMaintenance():renderDashboard();
  return "";
}

function announcementsForUser(){ return state.announcements.filter(a=>a.audience==="all"||a.audience==="both"||!a.audience); }
function announcementsForViewer(){ return state.announcements.filter(a=>a.audience==="viewer"||a.audience==="both"); }
function announcementBanner(list){
  if(!list||!list.length) return "";
  const item=a=>`<span class="ab-item"><strong>${esc(a.title)}</strong>${a.body?(" — "+esc(a.body)):""}<span class="ab-meta">${esc(a.author?a.author.full_name:"")}${a.publish_date?(" · "+new Date(a.publish_date).toLocaleDateString("fr-FR")):""}</span></span>`;
  const seq=list.map(item).join("");

}
function scoped(){ return state.tickets.filter(inPeriod); }
function renderDashboard(){
  const data=scoped(); const c=s=>data.filter(t=>t.status===s).length;
  const periods=[["today","Aujourd'hui"],["yesterday","Hier"],["last7","7 derniers jours"],["this_month","Ce mois"],["prev_month","Mois précédent"],["this_year","Cette année"],["custom","Personnalisée"]];
  const periodSelect=`<select id="dash-period">${periods.map(([v,l])=>`<option value="${v}" ${state.dashPeriod===v?'selected':''}>${l}</option>`).join("")}</select>`;
  const customRange=state.dashPeriod==="custom"?`<div class="field" style="margin-bottom:0;"><label>Du</label><input type="date" id="cf" value="${esc(state.customFrom)}"></div><div class="field" style="margin-bottom:0;"><label>Au</label><input type="date" id="ct" value="${esc(state.customTo)}"></div>`:"";
  const avg=avgResolution(data);
  const kpis=`<div class="stat-row">
    <div class="stat"><div class="n">${data.length}</div><div class="l">Total tickets</div></div>
    <div class="stat accent"><div class="n">${c("Pending")}</div><div class="l">Pending</div></div>
    <div class="stat accent"><div class="n">${c("In Progress")}</div><div class="l">In Progress</div></div>
    <div class="stat accent"><div class="n">${c("Testing")}</div><div class="l">Testing</div></div>
    <div class="stat"><div class="n">${c("Closed")}</div><div class="l">Closed</div></div>
    <div class="stat ${data.filter(isOverdue).length?'alert':''}"><div class="n">${avg==null?'—':avg.toFixed(1)+'j'}</div><div class="l">Tps moyen résol.</div></div>
  </div>`;
  const charts=`<div class="two-col">
    <div class="card"><div class="section-label">Par service</div>${barList(groupCount(data,t=>t.service))}</div>
    <div class="card"><div class="section-label">MEDLOGIX par module</div>${barList(groupCount(data.filter(t=>t.service==="MEDLOGIX"),t=>t.module))}</div>
  </div><div class="two-col">
    <div class="card"><div class="section-label">Par priorité</div>${barList(groupCount(data,t=>t.priority))}</div>
    <div class="card"><div class="section-label">Par statut</div>${barList(groupCount(data,t=>t.status))}</div>
  </div>`;
  const active=data.filter(t=>["In Progress","Testing","Reopened"].includes(t.status)).sort((a,b)=>statusRank(a.status)-statusRank(b.status)||priorityRank(a.priority)-priorityRank(b.priority));
  const activeBlock=`<div class="card" style="margin-bottom:18px;"><div class="section-label">À traiter — In Progress / Testing / Reopened</div>${active.length?`<div class="ticket-list">${active.slice(0,8).map(rowHtml).join("")}</div>`:`<div class="empty-state">Rien en cours.</div>`}</div>`;
  const recent=data.slice(0,6);
  const recentBlock=`<div class="card"><div class="section-label">Tickets récents</div>${recent.length?`<div class="ticket-list">${recent.map(rowHtml).join("")}</div>`:`<div class="empty-state">Aucun ticket.</div>`}</div>`;
  return `<h1 class="page-title">Tableau de bord</h1><p class="page-sub">Vue d'ensemble du Support Desk IT.</p>
    ${announcementBanner(announcementsForUser())}
    <div class="filters"><div class="field" style="margin-bottom:0;"><label>Période</label>${periodSelect}</div>${customRange}</div>
    ${kpis}${activeBlock}${charts}${recentBlock}`;
}
function avgResolution(data){ const ds=data.filter(t=>t.status==="Closed"&&t.closed_at).map(t=>(new Date(t.closed_at)-new Date(t.created_at))/86400000); return ds.length?ds.reduce((a,b)=>a+b,0)/ds.length:null; }
function groupCount(data,fn){ const m={}; data.forEach(t=>{const k=fn(t)||"—"; m[k]=(m[k]||0)+1;}); return Object.keys(m).map(k=>({label:k,count:m[k]})).sort((a,b)=>b.count-a.count); }
function barList(items){ if(!items.length) return `<div class="empty-state">Aucune donnée.</div>`; const max=Math.max(1,...items.map(i=>i.count)); return `<div class="bars">${items.map(i=>`<div class="bar-row"><div class="b-label" title="${esc(i.label)}">${esc(i.label)}</div><div class="b-track"><div class="b-fill" style="width:${Math.round(i.count/max*100)}%"></div></div><div class="b-count">${i.count}</div></div>`).join("")}</div>`; }

function onModuleChange(){ const m=document.getElementById("t-module").value; document.getElementById("t-screen").innerHTML=(MODULE_TREE[m]||[]).map(w=>`<option value="${esc(w)}">${esc(w)}</option>`).join(""); }
function renderStaffTickets(){
  const f=state.filter;
  const statusOpts=["all",...STATUSES].map(s=>`<option value="${s}" ${f.status===s?'selected':''}>${s==='all'?'Tous statuts':s}</option>`).join("");
  const svcOpts=["all",...getServices()].map(s=>`<option value="${esc(s)}" ${f.service===s?'selected':''}>${s==='all'?'Tous services':esc(s)}</option>`).join("");
  const prioOpts=["all",...getPriorities()].map(p=>`<option value="${esc(p)}" ${f.priority===p?'selected':''}>${p==='all'?'Toutes priorités':esc(p)}</option>`).join("");
  let list=state.tickets.slice();
  if(f.status!=="all") list=list.filter(t=>t.status===f.status);
  if(f.service!=="all") list=list.filter(t=>t.service===f.service);
  if(f.priority!=="all") list=list.filter(t=>t.priority===f.priority);
  if(f.search.trim()){ const q=f.search.toLowerCase(); list=list.filter(t=>(t.ticket_no||"").toLowerCase().includes(q)||(t.subject||"").toLowerCase().includes(q)||reqName(t).toLowerCase().includes(q)); }
  list.sort((a,b)=>statusRank(a.status)-statusRank(b.status)||priorityRank(a.priority)-priorityRank(b.priority)||new Date(b.created_at)-new Date(a.created_at));
  const newBtn = canCreate()?`<button class="btn secondary" data-action="goto-new">+ Nouveau ticket</button>`:"";

    ${list.length?`<div class="ticket-list">${list.map(rowHtml).join("")}</div>`:`<div class="empty-state">Aucun ticket.</div>`}`;

function renderStepper(status){
  const steps=["Pending","In Progress","Testing","Closed"]; const disp=status==="Reopened"?"In Progress":status; const idx=steps.indexOf(disp);
  return `<div class="stepper">${steps.map((s,i)=>{const c=i<idx?"done":(i===idx?"current":"");return `<div class="step ${c}"><div class="line"></div><div class="dot"></div><div class="lbl">${s}</div></div>`;}).join("")}</div>`;
}
function nextStatusOptions(cur){ switch(cur){case "Pending":return ["In Progress","Testing","Closed"];case "In Progress":return ["Testing","Closed"];case "Testing":return ["In Progress","Closed"];case "Reopened":return ["In Progress","Testing","Closed"];default:return [];} }
function renderTicketDetail(t){
  const overdue=isOverdue(t);
  const win=t.service==="MEDLOGIX"&&t.module?`<span>${esc(t.module)}${t.screen?(" / "+esc(t.screen)):""}</span>`:"";
  const assigned=t.assignee?`<span>Affecté à : ${esc(t.assignee.full_name||"")}</span>`:"";
  const history=(state.ticketActivity||[]).map(h=>{
    const staff=h.actor&&h.actor.role&&h.actor.role.name!=="user";
    let body="";
    if(h.type==="create") body="A créé le ticket.";
    else if(h.type==="comment") body=esc(h.comment);
    else if(h.type==="status") body=`${h.comment?esc(h.comment)+"<br>":""}<span style="color:var(--ink-soft);font-size:12px;">Statut : <strong>${esc(h.from_value)}</strong> → <strong>${esc(h.to_value)}</strong></span>`;
    else if(h.type==="priority") body=`<span style="color:var(--ink-soft);font-size:12px;">Priorité : <strong>${esc(h.from_value)}</strong> → <strong>${esc(h.to_value)}</strong></span>`;
    else if(h.type==="reopen") body=`${h.comment?esc(h.comment)+"<br>":""}<span style="color:var(--ink-soft);font-size:12px;">Réouverture</span>`;
    else if(h.type==="assign") body=`<span style="color:var(--ink-soft);font-size:12px;">Affectation : ${esc(h.to_value||"—")}</span>`;
    else body=esc(h.comment||"");
    const who=h.actor?(h.actor.full_name||"—"):"—";
    return `<div class="thread-item ${staff?'staff':''}"><div class="t-head"><span class="who">${esc(who)}</span><span>${fmtDate(h.created_at)}</span></div><div class="t-body">${body}</div></div>`;
  }).join("");
  let actions="";
  if(roleName()==="user"){
    actions=`<div class="section-label">Ajouter un commentaire</div><div class="resolve-box"><div class="field"><label for="user-comment">Commentaire</label><textarea id="user-comment"></textarea></div><div id="act-error"></div><button class="btn" data-action="user-comment" data-id="${t.id}">Envoyer</button></div>`;
  } else if(isStaff()){
    if(state.reopening){
      actions=`<div class="section-label">Réouverture</div><div class="resolve-box"><div class="field"><label for="staff-comment">Motif</label><textarea id="staff-comment"></textarea></div><div id="act-error"></div><div class="btn-row"><button class="btn" data-action="confirm-reopen" data-id="${t.id}">Confirmer</button><button class="btn secondary" data-action="cancel-reopen">Annuler</button></div></div>`;
    } else if(t.status==="Closed"){
      actions=`<div class="section-label">Ticket fermé</div><div class="btn-row"><button class="btn secondary" data-action="reopen" data-id="${t.id}">Rouvrir</button></div>`;
    } else {
      const opts=nextStatusOptions(t.status).map(s=>`<option value="${s}">${s}</option>`).join("");
      actions=`<div class="section-label">Réponse / mise à jour</div><div class="resolve-box"><div class="field"><label for="staff-comment">Commentaire</label><textarea id="staff-comment" placeholder="Analyse, action, motif…"></textarea></div><div class="field" style="max-width:260px;"><label for="staff-status">Nouveau statut</label><select id="staff-status">${opts}</select></div><div id="act-error"></div><div class="btn-row"><button class="btn" data-action="staff-update" data-id="${t.id}">Enregistrer</button></div></div>`;
    }
  }
  let staffControls="";
  if(isStaff()){
    const prioOpts=getPriorities().map(p=>`<option value="${p}" ${t.priority===p?'selected':''}>${p}</option>`).join("");
    staffControls=`<div class="two-col" style="margin-bottom:20px;">
      <div class="card"><div class="section-label">Priorité</div><div class="btn-row"><select id="prio-select" style="max-width:200px;">${prioOpts}</select><button class="btn tiny" data-action="set-priority" data-id="${t.id}">Mettre à jour</button></div></div>
      <div class="card"><div class="section-label">Affectation</div><div class="btn-row"><input type="text" id="assign-input" placeholder="nom de l'agent" value="${esc(t.assignee?t.assignee.full_name||'':'')}" style="max-width:240px;"><button class="btn tiny" data-action="assign" data-id="${t.id}">Affecter</button></div><div class="hint">Phase 1 : saisie libre (affectation par identité Supabase à venir).</div></div>
    </div>`;
  }
  return `<div class="detail-header"><div><span class="ticket-id">${esc(t.ticket_no||"")}</span><h2>${esc(t.subject)}</h2>
      <div class="meta" style="font-size:12.5px;color:var(--ink-soft);display:flex;gap:10px;flex-wrap:wrap;"><span class="badge svc">${esc(t.service)}</span>${win}<span>Demandeur : ${esc(reqName(t))}</span>${assigned}<span>Créé le ${fmtDate(t.created_at)}</span></div></div>
      <div style="display:flex;gap:8px;align-items:center;"><span class="badge priority-${t.priority}">${esc(t.priority)}</span><span class="badge ${statusClass(t.status)}">${esc(t.status)}</span>${overdue?`<span class="badge overdue">⚠ En retard</span>`:""}</div></div>
    ${renderStepper(t.status)}
    ${t.status==="Reopened"?`<div class="reopen-banner">🔁 Ticket rouvert.</div>`:""}
    ${staffControls}
    <div class="section-label">Description</div><div class="desc-box">${esc(t.description)}</div>
    <div class="section-label">Historique</div><div class="thread">${history||'<div class="empty-state">Chargement…</div>'}</div>
    ${actions}`;
}

// =========================== USERS (admin) ===========================
function renderUsers(){
  if(!state.usersLoaded){ loadUsers(); }
  let list;

async function loadUsers(){
  try{

      sb.from("profiles").select("*, role:roles(name)").order("created_at"),
      sb.from("roles").select("*").eq("is_active",true).order("name")
    ]);

}

function assetStatusLabel(v){ const l=state.lookups.find(x=>x.type==="asset_status"&&x.value===v); return l?l.label:v; }
function catName(id){ const c=state.assetCats.find(x=>x.id===id); return c?c.name:"—"; }

async function loadAssets(){
  try{

      sb.from("assets").select("*, category:category_id(name), location:location_id(name), assigned:assigned_user_id(full_name)").order("created_at",{ascending:false}),

    state.assets=a.data||[]; state.assetCats=cats.data||[]; state.profilesList=profs.data||[]; state.assetsLoaded=true; render();

function renderAssetsArea(){

function medlogixTickets(){ return state.tickets.filter(t=>t.service==="MEDLOGIX"); }
function monActiveMedlogix(){
  return medlogixTickets().filter(t=>["In Progress","Testing","Pending","Reopened"].includes(t.status))
    .sort((a,b)=>statusRank(a.status)-statusRank(b.status)||priorityRank(a.priority)-priorityRank(b.priority)||new Date(a.created_at)-new Date(b.created_at));
}
function monBars(items){
  if(!items.length) return `<div style="color:#7e93b3;font-size:13px;">Aucune donnée.</div>`;
  const max=Math.max(1,...items.map(i=>i.count));
  return items.map(i=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:9px;"><div style="width:130px;font-size:12px;color:#9fb3d1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(i.label)}">${esc(i.label)}</div><div style="flex:1;height:7px;background:#1c2a42;border-radius:5px;overflow:hidden;"><div style="height:100%;width:${Math.round(i.count/max*100)}%;background:#3aa0ff;border-radius:5px;"></div></div><div style="font-family:var(--mono);font-size:12px;width:24px;text-align:right;color:#cfe0f5;">${i.count}</div></div>`).join("");
}
function renderMonitor(){
  return `<div class="mon"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;flex-wrap:wrap;gap:8px;"><div style="font-size:20px;font-weight:800;">Monitoring MEDLOGIX — avancement des tâches</div><div style="font-size:12px;color:#7e93b3;">Supervision en lecture seule</div></div>${announcementBanner(announcementsForViewer())}<div id="mon-dynamic">${monDynamicHtml()}</div></div>`;
}
function monDynamicHtml(){
  const ml=medlogixTickets(); const c=s=>ml.filter(t=>t.status===s).length;
  const openCount=ml.filter(t=>t.status!=="Closed").length;
  const overdueCount=ml.filter(isOverdue).length;
  const kpis=`<div class="mon-kpis">
    <div class="mon-kpi"><div class="n">${openCount}</div><div class="l">MEDLOGIX ouverts</div></div>
    <div class="mon-kpi amber"><div class="n">${c("Pending")}</div><div class="l">Pending</div></div>
    <div class="mon-kpi blue"><div class="n">${c("In Progress")}</div><div class="l">In Progress</div></div>
    <div class="mon-kpi violet"><div class="n">${c("Testing")}</div><div class="l">Testing</div></div>
    <div class="mon-kpi pink"><div class="n">${c("Reopened")}</div><div class="l">Reopened</div></div>
    <div class="mon-kpi red"><div class="n">${overdueCount}</div><div class="l">En retard</div></div></div>`;
  const active=monActiveMedlogix();
  const rows=active.slice(0,14).map(t=>{
    const over=isOverdue(t); const mod=t.module?esc(t.module)+(t.screen?(" / "+esc(t.screen)):""):"—";
    return `<tr><td class="mon-id">${esc(t.ticket_no||"—")}</td><td class="mon-subj">${esc(t.subject)}</td><td style="color:#9fb3d1;font-size:12.5px;">${mod}</td><td><span class="badge priority-${t.priority}">${esc(t.priority)}</span></td><td><span class="badge ${statusClass(t.status)}">${esc(t.status)}</span></td><td style="color:#9fb3d1;font-size:12.5px;">${t.assignee?esc(t.assignee.full_name||""):"—"}</td><td class="mon-age ${over?'over':''}">${daysSince(t.created_at)} j</td></tr>`;
  }).join("");
  const mainPanel=`<div class="mon-panel"><h3>Tâches MEDLOGIX à traiter (${active.length}) — les plus anciennes en tête</h3>${active.length?`<table class="mon-table"><thead><tr><th>N°</th><th>Sujet</th><th>Module</th><th>Priorité</th><th>Statut</th><th>Affecté à</th><th>Âge</th></tr></thead><tbody>${rows}</tbody></table>`:`<div style="color:#7e93b3;padding:24px 0;text-align:center;">Aucune tâche MEDLOGIX en cours. 🎉</div>`}</div>`;
  const byStatus=STATUSES.filter(s=>s!=="Closed").map(s=>({label:s,count:c(s)})).filter(i=>i.count>0);
  const byModule=(()=>{const m={};ml.filter(t=>t.status!=="Closed").forEach(t=>{const k=t.module||"—";m[k]=(m[k]||0)+1;});return Object.keys(m).map(k=>({label:k,count:m[k]})).sort((a,b)=>b.count-a.count).slice(0,8);})();
  const others=(()=>{const m={};state.tickets.filter(t=>t.service!=="MEDLOGIX"&&t.status!=="Closed").forEach(t=>{m[t.service]=(m[t.service]||0)+1;});return Object.keys(m).map(k=>({label:k,count:m[k]}));})();
  const othersTotal=others.reduce((a,b)=>a+b.count,0);
  const sidePanel=`<div class="mon-panel"><h3>Répartition par statut (MEDLOGIX)</h3>${monBars(byStatus)}</div><div class="mon-panel"><h3>Par module (ouverts)</h3>${monBars(byModule)}</div><div class="mon-panel"><h3>Autres services (non prioritaires) — ${othersTotal} ouverts</h3><div class="mon-other">${others.length?others.map(o=>`<span class="chip">${esc(o.label.split(" (")[0])} : ${o.count}</span>`).join(""):'<span style="color:#7e93b3;font-size:12.5px;">Aucun</span>'}</div></div>`;
  return `${kpis}<div class="mon-grid"><div>${mainPanel}</div><div>${sidePanel}</div></div><div class="mon-foot"><span>Dernière synchro : ${state.lastSync?new Date(state.lastSync).toLocaleTimeString("fr-FR"):"—"} · actualisation automatique toutes les 10 s</span><span>${ml.length} tickets MEDLOGIX au total · ${ml.filter(t=>t.status==="Closed").length} clos</span></div>`;
}

// Onglet Annonces du mur d'écran : liste en lecture seule des annonces ciblant l'écran.
function renderMonitorAnnonces(){
  const list=announcementsForViewer();
  const rows=list.map(a=>`<div class="mon-panel"><div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;"><div style="font-weight:700;font-size:15px;color:#fff;">${esc(a.title)}</div><div style="font-size:12px;color:#7e93b3;">${esc(a.author?a.author.full_name:"")}${a.publish_date?(" · "+new Date(a.publish_date).toLocaleDateString("fr-FR")):""}</div></div>${a.body?`<div style="margin-top:8px;font-size:14px;color:#d7e2f0;line-height:1.5;white-space:pre-wrap;">${esc(a.body)}</div>`:""}</div>`).join("");
  return `<div class="mon"><div style="font-size:20px;font-weight:800;margin-bottom:14px;">Annonces de mise à jour</div>${list.length?rows:`<div class="mon-panel" style="text-align:center;color:#7e93b3;">Aucune annonce active pour le mur d'écran.</div>`}<div class="mon-foot"><span>Annonces publiées par l'administrateur · affichage en lecture seule</span></div></div>`;
}

// =========================== RAPPORT ===========================
function renderReport(){
  const data=state.tickets.filter(inPeriod); const ml=data.filter(t=>t.service==="MEDLOGIX"); const c=s=>ml.filter(t=>t.status===s).length;
  const periods=[["today","Aujourd'hui"],["yesterday","Hier"],["last7","7 derniers jours"],["this_month","Ce mois"],["prev_month","Mois précédent"],["this_year","Cette année"],["custom","Personnalisée"]];
  const periodSelect=`<select id="dash-period">${periods.map(([v,l])=>`<option value="${v}" ${state.dashPeriod===v?'selected':''}>${l}</option>`).join("")}</select>`;
  const customRange=state.dashPeriod==="custom"?`<div class="field" style="margin-bottom:0;"><label>Du</label><input type="date" id="cf" value="${esc(state.customFrom)}"></div><div class="field" style="margin-bottom:0;"><label>Au</label><input type="date" id="ct" value="${esc(state.customTo)}"></div>`:"";
  const avg=(()=>{const ds=ml.filter(t=>t.status==="Closed"&&t.closed_at).map(t=>(new Date(t.closed_at)-new Date(t.created_at))/86400000);return ds.length?ds.reduce((a,b)=>a+b,0)/ds.length:null;})();
  const tiles=`<div class="stat-row"><div class="stat"><div class="n">${ml.length}</div><div class="l">MEDLOGIX (total)</div></div><div class="stat accent"><div class="n">${ml.filter(t=>t.status!=="Closed").length}</div><div class="l">Ouverts</div></div><div class="stat accent"><div class="n">${c("In Progress")}</div><div class="l">In Progress</div></div><div class="stat accent"><div class="n">${c("Testing")}</div><div class="l">Testing</div></div><div class="stat"><div class="n">${c("Closed")}</div><div class="l">Closed</div></div><div class="stat"><div class="n">${avg==null?'—':avg.toFixed(1)+'j'}</div><div class="l">Tps moyen</div></div></div>`;
  const grp=(arr,key)=>{const m={};arr.forEach(t=>{const k=key(t)||"—";m[k]=(m[k]||0)+1;});return Object.keys(m).map(k=>[k,m[k]]).sort((a,b)=>b[1]-a[1]);};
  const tbl=(title,pairs)=>`<div class="card" style="margin-bottom:16px;"><div class="section-label">${title}</div><table style="width:100%;border-collapse:collapse;font-size:13px;"><tbody>${pairs.length?pairs.map(([k,v])=>`<tr><td style="padding:6px 8px;border-bottom:1px solid var(--border);">${esc(k)}</td><td style="padding:6px 8px;border-bottom:1px solid var(--border);text-align:right;font-family:var(--mono);">${v}</td></tr>`).join(""):`<tr><td>Aucune donnée</td><td></td></tr>`}</tbody></table></div>`;
  const open=ml.filter(t=>t.status!=="Closed").sort((a,b)=>statusRank(a.status)-statusRank(b.status)||priorityRank(a.priority)-priorityRank(b.priority)||new Date(a.created_at)-new Date(b.created_at));
  const openRows=open.map(t=>`<tr><td class="ticket-id">${esc(t.ticket_no||"")}</td><td>${esc(t.subject)}</td><td>${t.module?esc(t.module):"—"}</td><td>${esc(t.priority)}</td><td>${esc(t.status)}</td><td>${esc(reqName(t))}</td><td>${t.assignee?esc(t.assignee.full_name||""):"—"}</td><td style="font-family:var(--mono);">${daysSince(t.created_at)} j</td></tr>`).join("");
  return `<h1 class="page-title">Rapport MEDLOGIX</h1><p class="page-sub">Synthèse de l'avancement — généré le ${fmtDate(Date.now())}.</p>
    <div class="filters no-print"><div class="field" style="margin-bottom:0;"><label>Période</label>${periodSelect}</div>${customRange}<button class="btn secondary" data-action="print-report">Imprimer / PDF</button><button class="btn secondary" data-action="export-medlogix">Exporter CSV</button></div>
    ${tiles}
    <div class="two-col">${tbl("Par statut",grp(ml,t=>t.status))}${tbl("Par priorité",grp(ml,t=>t.priority))}</div>
    <div class="two-col">${tbl("Par module",grp(ml,t=>t.module))}${tbl("Par agent",grp(ml,t=>t.assignee?t.assignee.full_name:"Non affecté"))}</div>
    <div class="card"><div class="section-label">Tâches MEDLOGIX ouvertes (${open.length})</div>${open.length?`<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:12.5px;"><thead><tr><th style="text-align:left;padding:8px;border-bottom:1px solid var(--border);">N°</th><th style="text-align:left;padding:8px;border-bottom:1px solid var(--border);">Sujet</th><th style="text-align:left;padding:8px;border-bottom:1px solid var(--border);">Module</th><th style="text-align:left;padding:8px;border-bottom:1px solid var(--border);">Priorité</th><th style="text-align:left;padding:8px;border-bottom:1px solid var(--border);">Statut</th><th style="text-align:left;padding:8px;border-bottom:1px solid var(--border);">Demandeur</th><th style="text-align:left;padding:8px;border-bottom:1px solid var(--border);">Affecté</th><th style="text-align:left;padding:8px;border-bottom:1px solid var(--border);">Âge</th></tr></thead><tbody>${openRows}</tbody></table></div>`:`<div class="empty-state">Aucune tâche ouverte.</div>`}</div>`;
}
function exportMedlogixCSV(){
  const cols=["N°","Service","Module","Ecran","Priorite","Sujet","Demandeur","Statut","Affecte","Cree","Jours"];
  const rows=state.tickets.filter(t=>t.service==="MEDLOGIX").map(t=>[t.ticket_no||"",t.service,t.module||"",t.screen||"",t.priority,t.subject,reqName(t),t.status,t.assignee?t.assignee.full_name||"":"",new Date(t.created_at).toLocaleString("fr-FR"),String(daysSince(t.created_at))]);
  const csv=[cols,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download="medlog_medlogix.csv"; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

// =========================== EVENTS ===========================
function bindEvents(){
  document.querySelectorAll("[data-action]").forEach(el=>{ el.addEventListener(el.dataset.action==="change-role"?"change":"click", onAction); });
  const wire=(id,fn)=>{const e=document.getElementById(id); if(e) e.addEventListener("change",fn);};
  wire("f-status",e=>{state.filter.status=e.target.value; render();});
  wire("f-service",e=>{state.filter.service=e.target.value; render();});
  wire("f-priority",e=>{state.filter.priority=e.target.value; render();});
  wire("dash-period",e=>{state.dashPeriod=e.target.value; render();});
  wire("af-cat",e=>{state.assetFilter.cat=e.target.value; render();});
  wire("af-status",e=>{state.assetFilter.status=e.target.value; render();});
  const af=document.getElementById("af-search");
  if(af){ af.addEventListener("input",e=>{state.assetFilter.search=e.target.value; render();}); af.focus(); af.setSelectionRange(af.value.length,af.value.length); }
  wire("cf",e=>{state.customFrom=e.target.value; render();});
  wire("ct",e=>{state.customTo=e.target.value; render();});
  const fs=document.getElementById("f-search");
  if(fs){ fs.addEventListener("input",e=>{state.filter.search=e.target.value; render();}); fs.focus(); fs.setSelectionRange(fs.value.length,fs.value.length); }
}

async function onAction(e){
  const el=e.currentTarget, action=el.dataset.action;
  const busy=t=>{ el.disabled=true; if(el.tagName==="BUTTON"){ el.dataset._t=el.textContent; el.textContent=t; } };
  const unbusy=()=>{ el.disabled=false; if(el.dataset._t) el.textContent=el.dataset._t; };

  if(action==="nav"){ state.view=el.dataset.view; state.selectedTicketId=null; state.staffNew=false; state.selectedAssetId=null; state.assetNew=false; if(el.dataset.view==="users"){state.usersLoaded=false;} if(el.dataset.view==="assets"){state.assetsLoaded=false;} render(); return; }
  if(action==="mon-nav"){ state.view=el.dataset.view; render(); return; }
  if(action==="refresh-now"){ busy("…"); try{ await reloadTickets(); state.lastSync=Date.now(); }catch(e){} render(); return; }
  if(action==="fullscreen"){ try{ if(document.fullscreenElement) document.exitFullscreen(); else document.documentElement.requestFullscreen(); }catch(e){} return; }
  if(action==="print-report"){ window.print(); return; }
  if(action==="export-medlogix"){ exportMedlogixCSV(); return; }
  if(action==="logout"){ if(monDataTimer){clearInterval(monDataTimer);monDataTimer=null;} if(monClockTimer){clearInterval(monClockTimer);monClockTimer=null;} await sb.auth.signOut(); state.session=null; state.profile=null; state.view="dashboard"; render(); return; }
  if(action==="retry"){ state.booting=true; render(); await afterLogin(); return; }
  if(action==="goto-new"){ state.view="tickets"; state.selectedTicketId=null; state.staffNew=true; if(!state.newService) state.newService=getServices()[0]; render(); return; }
  if(action==="staff-new-cancel"){ state.staffNew=false; render(); return; }

  if(action==="login"){
    const email=document.getElementById("login-email").value.trim();
    const password=document.getElementById("login-password").value;
    if(!email||!password){ state.loginError="Saisissez votre e-mail et votre mot de passe."; render(); return; }
    busy("Connexion…");
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if(error){ state.loginError=error.message; render(); return; }
    state.session=data.session; state.loginError=""; state.booting=true; render(); await afterLogin(); return;
  }

  if(action==="open-ticket"){ state.selectedTicketId=el.dataset.id; state.reopening=false; state.ticketActivity=[]; render(); await loadActivity(el.dataset.id); return; }
  if(action==="back"){ state.selectedTicketId=null; state.reopening=false; render(); return; }
  if(action==="reopen"){ state.reopening=true; render(); return; }
  if(action==="cancel-reopen"){ state.reopening=false; render(); return; }

  if(action==="submit-ticket"){
    const service=document.getElementById("t-service").value;
    const priority=document.getElementById("t-priority").value;
    const subject=document.getElementById("t-subject").value.trim();
    const description=document.getElementById("t-desc").value.trim();
    const errBox=document.getElementById("form-error");
    if(!subject||!description){ errBox.innerHTML=`<div class="error-msg">Sujet et description obligatoires.</div>`; return; }
    const row={ service, priority, subject, description, requester_id:uid(), status:"Pending" };
    if(service==="MEDLOGIX"){ row.module=document.getElementById("t-module").value; row.screen=document.getElementById("t-screen").value; }
    busy("Envoi…");
    const { data:ins, error } = await sb.from("tickets").insert(row).select().single();
    if(error){ errBox.innerHTML=`<div class="error-msg">${esc(error.message)}</div>`; unbusy(); return; }
    await sb.from("ticket_activity").insert({ ticket_id:ins.id, actor_id:uid(), type:"create" });
    await reloadTickets(); state.view="tickets"; state.selectedTicketId=null; state.staffNew=false; render(); return;
  }

  if(action==="user-comment"||action==="staff-update"||action==="confirm-reopen"){
    const id=el.dataset.id; const errBox=document.getElementById("act-error");
    const commentEl=document.getElementById(action==="user-comment"?"user-comment":"staff-comment");
    const comment=commentEl?commentEl.value.trim():"";
    if((action==="staff-update"||action==="confirm-reopen") && !comment){ errBox.innerHTML=`<div class="error-msg">Un commentaire est requis.</div>`; return; }
    if(action==="user-comment" && !comment){ errBox.innerHTML=`<div class="error-msg">Commentaire vide.</div>`; return; }
    busy("Enregistrement…");
    try{
      if(action==="user-comment"){ await sb.from("ticket_activity").insert({ticket_id:id, actor_id:uid(), type:"comment", comment}); }
      else if(action==="staff-update"){
        const status=document.getElementById("staff-status").value; const old=getTicket(id).status;
        await sb.from("tickets").update({ status, closed_at: status==="Closed"?new Date().toISOString():null }).eq("id",id);
        await sb.from("ticket_activity").insert({ticket_id:id, actor_id:uid(), type:"status", from_value:old, to_value:status, comment});
      } else {
        const old=getTicket(id).status;
        await sb.from("tickets").update({ status:"Reopened", closed_at:null }).eq("id",id);
        await sb.from("ticket_activity").insert({ticket_id:id, actor_id:uid(), type:"reopen", from_value:old, to_value:"Reopened", comment});
        state.reopening=false;
      }
      await reloadTickets(); await loadActivity(id); render();
    }catch(err){ errBox.innerHTML=`<div class="error-msg">${esc(err.message||String(err))}</div>`; unbusy(); }
    return;
  }
  if(action==="set-priority"){
    const id=el.dataset.id, priority=document.getElementById("prio-select").value, old=getTicket(id).priority;
    busy("…");
    try{ await sb.from("tickets").update({priority}).eq("id",id); await sb.from("ticket_activity").insert({ticket_id:id, actor_id:uid(), type:"priority", from_value:old, to_value:priority}); await reloadTickets(); await loadActivity(id); render(); }
    catch(err){ alert(err.message||String(err)); unbusy(); } return;
  }
  if(action==="assign"){
    const id=el.dataset.id, name=document.getElementById("assign-input").value.trim();
    busy("…");
    try{ await sb.from("ticket_activity").insert({ticket_id:id, actor_id:uid(), type:"assign", to_value:name}); await loadActivity(id); render(); }
    catch(err){ alert(err.message||String(err)); unbusy(); } return;
  }

  // ---- Assets (Phase 2) ----
  if(action==="asset-new"){ state.assetNew=true; state.selectedAssetId=null; render(); return; }
  if(action==="asset-cancel"){ state.assetNew=false; render(); return; }
  if(action==="open-asset"){ state.selectedAssetId=el.dataset.id; state.assetMovements=[]; render(); await loadAssetMovements(el.dataset.id); return; }
  if(action==="asset-back"){ state.selectedAssetId=null; render(); return; }
  if(action==="submit-asset"){
    const tag=document.getElementById("as-tag").value.trim();
    const name=document.getElementById("as-name").value.trim();
    const category_id=document.getElementById("as-cat").value;
    const serial_no=document.getElementById("as-serial").value.trim();
    const status=document.getElementById("as-status").value;
    const owner_type=document.getElementById("as-owner").value;
    const purchase_date=document.getElementById("as-purchase").value||null;
    const warranty_expiry=document.getElementById("as-warranty").value||null;
    const notes=document.getElementById("as-notes").value.trim();
    const errBox=document.getElementById("as-error");
    if(!tag||!name){ errBox.innerHTML=`<div class="error-msg">Tag et désignation obligatoires.</div>`; return; }
    busy("Enregistrement…");
    const { error } = await sb.from("assets").insert({ asset_tag:tag, name, category_id, serial_no, status, owner_type, purchase_date, warranty_expiry, notes });
    if(error){ errBox.innerHTML=`<div class="error-msg">${esc(error.message)}</div>`; unbusy(); return; }
    await reloadAssets(); state.assetNew=false; render(); return;
  }
  if(action==="asset-status"){
    const id=el.dataset.id, to_status=document.getElementById("as-status-upd").value, from_status=state.assets.find(x=>x.id===id).status;
    if(to_status===from_status){ return; }
    busy("…");
    try{
      await sb.from("assets").update({status:to_status}).eq("id",id);
      await sb.from("asset_movements").insert({ asset_id:id, type:"status_change", from_status, to_status, actor_id:uid() });
      await reloadAssets(); await loadAssetMovements(id); render();
    }catch(err){ alert(err.message||String(err)); unbusy(); } return;
  }
  if(action==="asset-assign"){
    const id=el.dataset.id, to_user_id=document.getElementById("as-assign-user").value;
    if(!to_user_id){ alert("Choisissez un utilisateur."); return; }
    const cur=state.assets.find(x=>x.id===id);
    busy("…");
    try{
      await sb.from("assets").update({ assigned_user_id:to_user_id, status:"Assigned" }).eq("id",id);
      await sb.from("asset_movements").insert({ asset_id:id, type:"assignment", to_user_id, from_user_id:cur.assigned_user_id||null, from_status:cur.status, to_status:"Assigned", actor_id:uid() });
      await reloadAssets(); await loadAssetMovements(id); render();
    }catch(err){ alert(err.message||String(err)); unbusy(); } return;
  }
  if(action==="asset-return"){
    const id=el.dataset.id, cur=state.assets.find(x=>x.id===id);
    busy("…");
    try{
      await sb.from("assets").update({ assigned_user_id:null, status:"In Stock" }).eq("id",id);
      await sb.from("asset_movements").insert({ asset_id:id, type:"return", from_user_id:cur.assigned_user_id||null, from_status:cur.status, to_status:"In Stock", actor_id:uid() });
      await reloadAssets(); await loadAssetMovements(id); render();
    }catch(err){ alert(err.message||String(err)); unbusy(); } return;
  }

  // ---- Maintenance ----
  if(action==="maint-subview"){ state.maintSubview=el.dataset.view; render(); return; }
  if(action==="lookup-type"){ state.lookupType=el.dataset.type; render(); return; }
  if(action==="create-announcement"){
    const title=document.getElementById("an-title").value.trim();
    const body=document.getElementById("an-body").value.trim();
    const category=document.getElementById("an-cat").value.trim()||"Général";
    const audience=document.getElementById("an-audience").value;
    const errBox=document.getElementById("an-error");
    if(!title){ errBox.innerHTML=`<div class="error-msg">Titre obligatoire.</div>`; return; }
    busy("Publication…");
    const { error } = await sb.from("announcements").insert({ title, body, category, audience, author_id:uid(), is_active:true, scroll:true });
    if(error){ errBox.innerHTML=`<div class="error-msg">${esc(error.message)}</div>`; unbusy(); return; }
    state.announcements=await fetchAnnouncements(); render(); return;
  }
  if(action==="toggle-announcement"){ busy("…"); await sb.from("announcements").update({is_active:false}).eq("id",el.dataset.id); state.announcements=await fetchAnnouncements(); render(); return; }
  if(action==="del-announcement"){ if(!confirm("Supprimer cette annonce ?")) return; busy("…"); await sb.from("announcements").delete().eq("id",el.dataset.id); state.announcements=await fetchAnnouncements(); render(); return; }
  if(action==="create-lookup"){
    const value=document.getElementById("lk-value").value.trim(); const errBox=document.getElementById("lk-error");
    if(!value){ errBox.innerHTML=`<div class="error-msg">Saisissez une valeur.</div>`; return; }
    busy("Ajout…");
    const sort=state.lookups.filter(l=>l.type===state.lookupType).length+1;
    const { error } = await sb.from("lookups").insert({ type:state.lookupType, value, label:value, sort_order:sort, is_active:true });
    if(error){ errBox.innerHTML=`<div class="error-msg">${esc(error.message)}</div>`; unbusy(); return; }
    state.lookups=await fetchLookups(); render(); return;
  }
  if(action==="del-lookup"){ if(!confirm("Supprimer cette valeur ?")) return; busy("…"); await sb.from("lookups").delete().eq("id",el.dataset.id); state.lookups=await fetchLookups(); render(); return; }

  // ---- Users ----
  if(action==="change-role"){
    const id=el.dataset.id, role_id=el.value;
    try{ await sb.from("profiles").update({role_id}).eq("id",id); await loadUsers(); }
    catch(err){ alert(err.message||String(err)); } return;
  }
  if(action==="toggle-active"){
    const id=el.dataset.id, active=el.dataset.active==="1";
    busy("…");
    try{ await sb.from("profiles").update({is_active:active}).eq("id",id); await loadUsers(); }
    catch(err){ alert(err.message||String(err)); unbusy(); } return;
  }
}
async function loadActivity(id){
  const { data } = await sb.from("ticket_activity").select("*, actor:actor_id(full_name, role:roles(name))").eq("ticket_id",id).order("created_at");
  state.ticketActivity=data||[];
  if(state.selectedTicketId===id) render();
}

// --- Go ---
init();
</script>
